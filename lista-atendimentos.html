<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico - Equilibrium</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f4f0fa; display: flex; min-height: 100vh; }
    .sidebar { width: 240px; background: linear-gradient(180deg, #4b0082, #6a0dad); color: #fff; padding: 20px 0; min-height: 100vh; position: fixed; top: 0; left: 0; }
    .sidebar h2 { text-align: center; font-size: 22px; margin-bottom: 30px; letter-spacing: 1px; }
    .sidebar a { display: block; color: #fff; text-decoration: none; padding: 14px 24px; font-size: 15px; transition: background 0.2s; }
    .sidebar a:hover { background: rgba(255,255,255,0.15); }
    .sidebar a.active { background: rgba(255,255,255,0.25); font-weight: bold; border-left: 4px solid #ffd700; }
    .content { margin-left: 240px; flex: 1; padding: 30px; }
    .header h1 { color: #4b0082; font-size: 26px; }
    .header p { color: #666; font-size: 14px; margin-top: 4px; }
    .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(75,0,130,0.08); margin-top: 20px; }
    .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .card-header h3 { color: #4b0082; }
    .btn { background: #6a0dad; color: #fff; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
    .btn:hover { background: #4b0082; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px 14px; color: #4b0082; border-bottom: 2px solid #ede2f7; font-size: 13px; }
    td { padding: 12px 14px; border-bottom: 1px solid #f0e8f7; color: #333; font-size: 14px; }
    .loading { text-align: center; padding: 40px; color: #6a0dad; }
    .empty { text-align: center; padding: 40px; color: #999; }
    .search { margin-bottom: 16px; }
    .search input { padding: 8px 12px; border: 1px solid #ccc; border-radius: 8px; width: 250px; }
  </style>
</head>
<body>
  <div class="sidebar">
    <h2>Equilibrium</h2>
    <a href="novo-cliente.html">Home</a>
    <a href="clientes.html">Lista de Clientes</a>
    <a href="atendimentos.html">Atendimentos</a>
    <a href="lista-atendimentos.html" class="active">Histórico</a>
  </div>
  <div class="content">
    <div class="header">
      <h1>Histórico de Atendimentos</h1>
      <p>Visualize todos os atendimentos registrados</p>
    </div>
    <div class="card">
      <div class="card-header">
        <h3>Atendimentos Registrados</h3>
        <div style="display:flex; gap:10px; align-items:center;">
          <input type="text" id="busca" placeholder="Buscar por cliente..." oninput="filtrar()" style="padding:8px 12px;border:1px solid #ccc;border-radius:8px;">
          <button class="btn" onclick="carregar()">Atualizar</button>
        </div>
      </div>
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>ID Atend.</th>
            <th>Cliente</th>
            <th>Status</th>
            <th>Queixa Principal</th>
          </tr>
        </thead>
        <tbody id="corpo">
          <tr><td colspan="5" class="loading">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  <script>
    const URL = 'https://script.google.com/macros/s/AKfycbwcInOPirRB7TOWbWFgpQtyFyhYZRHZsB37pB8PavrHxE0PZZpuwasuU_qallBiYlZm/exec';
    let dadosBrutos = [];

    function pegar(item, alternativas) {
      if (!item || typeof item !== 'object') return '-';
      for (let alt of alternativas) {
        // Procura exato
        if (item[alt] !== undefined && item[alt] !== null && String(item[alt]).trim() !== '') {
          return item[alt];
        }
        // Procura ignorando maiúscula
        for (let chave in item) {
          if (chave.toLowerCase() === alt.toLowerCase()) {
            let v = item[chave];
            if (v !== undefined && v !== null && String(v).trim() !== '') return v;
          }
        }
      }
      return '-';
    }

    function formatarData(valor) {
      if (!valor || valor === '-') return '-';
      try {
        let d = new Date(valor);
        if (!isNaN(d.getTime())) {
          return d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'});
        }
      } catch(e) {}
      return String(valor).substring(0, 16);
    }

    function montar(linha) {
      let data = pegar(linha, ['Data do Atendimento', 'data', 'dataAtendimento']);
      let id = pegar(linha, ['ID Atendimento', 'idAtendimento', 'id']);
      let cliente = pegar(linha, ['Nome Cliente', 'nomeCliente', 'nome', 'cliente']);
      let status = pegar(linha, ['Status', 'status']);
      let queixa = pegar(linha, ['Queixa Principal', 'queixaPrincipal', 'queixa']);
      return `<tr><td>${formatarData(data)}</td><td>${id}</td><td>${cliente}</td><td>${status}</td><td>${String(queixa).substring(0,60)}</td></tr>`;
    }

    function renderizar(lista) {
      const corpo = document.getElementById('corpo');
      if (!lista || lista.length === 0) {
        corpo.innerHTML = '<tr><td colspan="5" class="empty">Nenhum atendimento encontrado.</td></tr>';
        return;
      }
      corpo.innerHTML = lista.map(montar).join('');
    }

    function filtrar() {
      const termo = document.getElementById('busca').value.toLowerCase();
      if (!termo) { renderizar(dadosBrutos); return; }
      const filtrados = dadosBrutos.filter(item => {
        const texto = JSON.stringify(item).toLowerCase();
        return texto.includes(termo);
      });
      renderizar(filtrados);
    }

    async function carregar() {
      const corpo = document.getElementById('corpo');
      corpo.innerHTML = '<tr><td colspan="5" class="loading">Carregando...</td></tr>';
      try {
        const res = await fetch(URL + '?read=true');
        const json = await res.json();
        // Tenta extrair o array de dados
        let lista = json.data || json.dados || json.registros || json.atendimentos || json;
        if (!Array.isArray(lista)) lista = [];
        dadosBrutos = lista;
        renderizar(lista);
      } catch(e) {
        corpo.innerHTML = '<tr><td colspan="5" class="empty">Erro ao carregar: ' + e.message + '</td></tr>';
      }
    }

    window.onload = carregar;
  </script>
</body>
</html>

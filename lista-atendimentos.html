<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histórico - Equilibrium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background-color: #f4f0fa; min-height: 100vh; }
        .sidebar { width: 250px; background: linear-gradient(180deg, #4b0082 0%, #6a0dad 100%); color: white; padding: 20px; position: fixed; height: 100vh; }
        .sidebar h2 { text-align: center; color: #ffd700; margin-bottom: 30px; }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 12px; margin-bottom: 10px; border-radius: 8px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,215,0,0.2); color: #ffd700; font-weight: bold; }
        .content { margin-left: 250px; flex: 1; padding: 40px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        th { background: #f8f5ff; color: #4b0082; font-size: 12px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Equilibrium</h2>
        <nav>
            <a href="novo-cliente.html">🏠 Home</a>
            <a href="clientes.html">📋 Lista de Clientes</a>
            <a href="atendimentos.html">✨ Novo Atendimento</a>
            <a href="lista-atendimentos.html" class="active">📜 Histórico</a>
        </nav>
    </div>
    <div class="content">
        <h1 style="color: #4b0082; margin-bottom: 20px;">Histórico de Atendimentos</h1>
        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>ID Atend.</th>
                        <th>Cliente</th>
                        <th>Status</th>
                        <th>Queixa Principal</th>
                    </tr>
                </thead>
                <tbody id="corpoHistorico"></tbody>
            </table>
        </div>
    </div>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwcInOPirRB7TOWbWFgpQtyFyhYZRHZsB37pB8PavrHxE0PZZpuwasuU_qallBiYlZm/exec';
        async function carregarHistorico() {
            try {
                const res = await fetch(SCRIPT_URL + "?read=true");
                const json = await res.json();
                // O script retorna: { success: true, data: [...] }
                const dados = json.data || [];
                const corpo = document.getElementById('corpoHistorico');
                corpo.innerHTML = dados.map(linha => `
                    <tr>
                        <td>${linha['Data do Atendimento'] || '-'}</td>
                        <td style="font-family:monospace; font-size:11px;">${linha['ID Atendimento'] || '-'}</td>
                        <td><strong>${linha['Nome Cliente'] || '-'}</strong></td>
                        <td>${linha['Status'] || '-'}</td>
                        <td>${(linha['Queixa Principal'] || '-').substring(0, 50)}...</td>
                    </tr>
                `).join('');
            } catch (e) { console.error(e); }
        }
        window.onload = carregarHistorico;
    </script>
</body>
</html>

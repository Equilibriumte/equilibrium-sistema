<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equilibrium - Histórico de Atendimentos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #f4f0fa;
      color: #333;
      min-height: 100vh;
    }

    .layout {
      min-height: 100vh;
    }

    .sidebar { width: 250px; background: linear-gradient(180deg, #4b0082 0%, #6a0dad 100%); color: #ffd700; padding: 20px; position: fixed; height: 100vh; z-index: 100; }
    .sidebar h2 { text-align: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px; }
    .sidebar a { display: block; color: white; text-decoration: none; padding: 12px; margin-bottom: 10px; border-radius: 8px; transition: 0.3s; }
    .sidebar a:hover, .sidebar a.active { background: rgba(255,215,0,0.2); color: #ffd700; font-weight: bold; }

    .main {
      margin-left: 250px;
      padding: 32px;
      overflow-x: hidden;
    }

    .header {
      margin-bottom: 24px;
    }

    .header h2 {
      font-size: 26px;
      color: #4b0082;
      font-weight: 700;
    }

    .header p {
      color: #6a0dad;
      margin-top: 4px;
      font-size: 14px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 20px rgba(75, 0, 130, 0.08);
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .toolbar input {
      padding: 10px 14px;
      border: 1px solid #d9c9e8;
      border-radius: 8px;
      font-size: 14px;
      width: 280px;
      max-width: 100%;
      outline: none;
      transition: border 0.2s ease;
    }

    .toolbar input:focus {
      border-color: #6a0dad;
    }

    .status {
      font-size: 13px;
      color: #6a0dad;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #ece3f5;
    }

    table {
      border-collapse: collapse;
      width: max-content;
      min-width: 100%;
      table-layout: fixed;
    }

    thead th {
      background: #4b0082;
      color: #fff;
      text-align: left;
      padding: 12px 14px;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    thead th.col-fixed {
      position: sticky;
      left: 0;
      z-index: 4;
      background: #4b0082;
    }

    thead th.col-fixed-2 {
      position: sticky;
      left: 150px;
      z-index: 4;
      background: #4b0082;
    }

    tbody td {
      padding: 12px 14px;
      font-size: 13px;
      border-bottom: 1px solid #f0e9f7;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      background: #fff;
    }

    tbody td.col-fixed {
      position: sticky;
      left: 0;
      z-index: 3;
      background: #fff;
      box-shadow: 2px 0 4px rgba(75, 0, 130, 0.06);
    }

    tbody td.col-fixed-2 {
      position: sticky;
      left: 150px;
      z-index: 3;
      background: #fff;
      box-shadow: 2px 0 4px rgba(75, 0, 130, 0.06);
    }

    tbody tr:hover td {
      background: #f7f2fc;
    }

    tbody tr:hover td.col-fixed,
    tbody tr:hover td.col-fixed-2 {
      background: #f0e6fa;
    }

    .empty {
      text-align: center;
      padding: 40px;
      color: #999;
      font-size: 14px;
    }

    .loader {
      text-align: center;
      padding: 40px;
      color: #6a0dad;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 70px;
      }
      .sidebar h2,
      .sidebar nav a span {
        display: none;
      }
      .main {
        margin-left: 0;
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="sidebar">
        <h2>Equilibrium</h2>
        <nav>
            <a href="index.html">🏠 Home</a>
            <a href="agenda.html">📅 Agenda</a>
            <a href="novo-cliente.html">👤 Novo Cliente</a>
            <a href="clientes.html">📋 Lista de Clientes</a>
            <a href="atendimentos.html">✨ Novo Atendimento</a>
            <a href="lista-atendimentos.html" class="active">📜 Lista de Atendimento</a>
            <a href="novo-tratamento.html">🩺 Novo Tratamento</a>
            <a href="lista-tratamentos.html">📋 Lista de Tratamentos</a>
            <a href="agenda-graficos.html">📊 Agenda de Gráficos</a>
            <a href="financeiro.html">💰 Financeiro</a>
        </nav>
    </div>

    <main class="main">
      <div class="header">
        <h2>Histórico de Atendimentos</h2>
        <p>Visualização completa de todos os atendimentos registrados.</p>
      </div>

      <div class="card">
        <div class="toolbar">
          <input type="text" id="busca" placeholder="Buscar por cliente, ID ou queixa...">
          <div class="status" id="status">Carregando...</div>
        </div>

        <div class="table-wrapper">
          <table id="tabela">
            <thead>
              <tr id="thead-row"></tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script>
    const COLUNAS = [
      "Data do Atendimento",
      "ID Atendimento",
      "ID Cliente",
      "Nome Cliente",
      "Status",
      "Queixa Principal",
      "Queixa Secundária",
      "Bovis",
      "Coronário",
      "Frontal",
      "Laríngeo",
      "Cardíaco",
      "Umbilical",
      "Sacro",
      "Básico",
      "Tamanho Aura",
      "Proteção Aura",
      "Cores Excesso",
      "Cores Falta",
      "Mental",
      "Emocional",
      "Espiritual",
      "Físico",
      "Diagnóstico Inicial",
      "Queixa Espec.",
      "Causa Raiz",
      "Crenças",
      "Diagnóstico Específico",
      "Tipo Ambiente",
      "Endereço Ambiente",
      "Queixa Ambiente",
      "Pessoas Envolvidas",
      "Diagnóstico Ambiente",
      "Tipo Busca",
      "Descrição Busca",
      "Info Busca",
      "Resultado Busca"
    ];

    const URL = "https://script.google.com/macros/s/AKfycbx-uKmdoSwoTelfZsl_Mjx0dCOE2uVdowAOyg9L0u23te_g7getcZAhKMtrRQ5f3pi0/exec";
    let dadosOriginais = [];

    function normalizarChave(chave) {
      return String(chave || "")
        .trim()
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "");
    }

    function construirMapa(obj) {
      const mapa = {};
      if (!obj || typeof obj !== "object") return mapa;
      Object.keys(obj).forEach(function (k) {
        mapa[normalizarChave(k)] = obj[k];
      });
      return mapa;
    }

    function valorDe(mapa, nomeColuna) {
      const chave = normalizarChave(nomeColuna);
      if (chave in mapa) return mapa[chave];
      const semEspacos = chave.replace(/\s+/g, "");
      if (semEspacos in mapa) return mapa[semEspacos];
      const semPontos = chave.replace(/[.]/g, "");
      if (semPontos in mapa) return mapa[semPontos];
      return "";
    }

    function formatarValor(v) {
      if (v === null || v === undefined) return "";
      if (typeof v === "number") return String(v);
      if (typeof v === "object") return JSON.stringify(v);
      return String(v);
    }

    function renderizarTabela(dados) {
      const theadRow = document.getElementById("thead-row");
      const tbody = document.getElementById("tbody");
      theadRow.innerHTML = "";
      tbody.innerHTML = "";

      COLUNAS.forEach(function (col, idx) {
        const th = document.createElement("th");
        th.textContent = col;
        if (idx === 0) th.classList.add("col-fixed");
        if (idx === 3) th.classList.add("col-fixed-2");
        theadRow.appendChild(th);
      });

      if (!dados || dados.length === 0) {
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = COLUNAS.length;
        td.className = "empty";
        td.textContent = "Nenhum atendimento encontrado.";
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
      }

      dados.forEach(function (linha) {
        const mapa = construirMapa(linha);
        const tr = document.createElement("tr");
        COLUNAS.forEach(function (col, idx) {
          const td = document.createElement("td");
          const valor = formatarValor(valorDe(mapa, col));
          td.textContent = valor;
          td.title = valor;
          if (idx === 0) td.classList.add("col-fixed");
          if (idx === 3) td.classList.add("col-fixed-2");
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    function filtrarDados(termo) {
      const t = normalizarChave(termo);
      if (!t) return dadosOriginais;
      return dadosOriginais.filter(function (linha) {
        const mapa = construirMapa(linha);
        return COLUNAS.some(function (col) {
          return normalizarChave(formatarValor(valorDe(mapa, col))).indexOf(t) !== -1;
        });
      });
    }

    async function carregar() {
      const status = document.getElementById("status");
      status.textContent = "Carregando...";
      try {
        const resp = await fetch(URL + "?read=true");
        const json = await resp.json();
        const data = json && Array.isArray(json.data) ? json.data : [];
        dadosOriginais = data;
        renderizarTabela(data);
        status.textContent = data.length + " registro(s) carregado(s).";
      } catch (err) {
        console.error(err);
        status.textContent = "Erro ao carregar dados.";
        renderizarTabela([]);
      }
    }

    document.getElementById("busca").addEventListener("input", function (e) {
      renderizarTabela(filtrarDados(e.target.value));
    });

    carregar();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilibrium - Sistema Interno</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #2d0a4e 0%, #4b1d7a 50%, #2d0a4e 100%);
            color: #f5e6c8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.8rem;
            color: #d4af37;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #c9b8e6;
            font-weight: 300;
            letter-spacing: 1px;
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
            width: 100%;
            max-width: 500px;
        }

        .btn-primary {
            width: 100%;
            padding: 22px 40px;
            font-size: 1.4rem;
            font-weight: 600;
            color: #2d0a4e;
            background: linear-gradient(135deg, #d4af37 0%, #f5e6c8 50%, #d4af37 100%);
            border: 2px solid #d4af37;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: inline-block;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(212, 175, 55, 0.5);
        }

        .btn-secondary {
            width: 100%;
            padding: 16px 30px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #d4af37;
            background: transparent;
            border: 2px solid #d4af37;
            border-radius: 12px;
            cursor: pointer;
            text-decoration: none;
            text-align: center;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(212, 175, 55, 0.15);
            transform: translateY(-2px);
        }

        footer {
            margin-top: 60px;
            font-size: 0.85rem;
            color: #8a7aa8;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Equilibrium - Sistema Interno</h1>
        <p class="subtitle">Gestão de Clientes</p>
    </header>

    <main>
        <a href="novo-cliente.html" class="btn-primary">Cadastrar Novo Cliente</a>
        <a href="clientes.html" class="btn-secondary">Ver Lista de Clientes</a>
    </main>

    <footer>
        <p>&copy; Equilibrium - Sistema Interno</p>
    </footer>
</body>
</html>

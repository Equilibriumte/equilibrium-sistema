<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilibrium - Sistema Interno</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #2B0A3D;
            background-image: radial-gradient(circle at top, #4A1259 0%, #2B0A3D 60%);
            color: #FFD700;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            width: 90%;
            max-width: 800px;
            padding: 40px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 50px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            letter-spacing: 1px;
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }

        .btn {
            display: inline-block;
            width: 100%;
            max-width: 400px;
            padding: 20px 30px;
            font-size: 1.25rem;
            font-weight: bold;
            text-decoration: none;
            color: #2B0A3D;
            background: linear-gradient(135deg, #FFD700, #FFC400);
            border: 2px solid #FFD700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, #FFE55C, #FFD700);
        }

        .btn:active {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Equilibrium - Sistema Interno</h1>
        <div class="menu-buttons">
            <a href="novo-cliente.html" class="btn">Cadastrar Novo Cliente</a>
            <a href="clientes.html" class="btn">Lista de Clientes</a>
        </div>
    </div>
</body>
</html>

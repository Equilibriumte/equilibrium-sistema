<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilibrium Terapias Energéticas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #2a1616; 
            background: linear-gradient(135deg, #2a1616 0%, #3d1d5f 50%, #2a1616 100%);
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 90%;
        }
        .logo {
            max-width: 100%;
            height: auto;
            margin-bottom: 30px;
        }
        .logo-img {
            max-width: 320px;
            width: 100%;
            height: auto;
        }
        h1 {
            color: #d4af37;
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #d4af37;
            font-size: 14px;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }
        .welcome {
            color: white;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        .btn-acessar {
            display: inline-block;
            background-color: #d4af37;
            color: #2a1616;
            padding: 16px 50px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }
        .btn-acessar:hover {
            background-color: #c5a030;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.5);
        }
        footer {
            margin-top: 60px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo grande -->
        <div class="logo">
            <svg viewBox="0 0 320 100" width="320" height="100" style="max-width:100%;height:auto">
                <defs>
                    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#d4af37"/>
                        <stop offset="50%" style="stop-color:#f0d060"/>
                        <stop offset="100%" style="stop-color:#b8962e"/>
                    </linearGradient>
                </defs>
                <!-- Triângulo -->
                <polygon points="10,90 55,10 100,90" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
                <!-- Linhas internas do triângulo -->
                <line x1="55" y1="10" x2="55" y2="90" stroke="url(#gold)" stroke-width="1.5"/>
                <line x1="10" y1="90" x2="55" y2="50" stroke="url(#gold)" stroke-width="1.5"/>
                <line x1="100" y1="90" x2="55" y2="50" stroke="url(#gold)" stroke-width="1.5"/>
                <!-- Círculo/cabeça -->
                <circle cx="55" cy="28" r="8" fill="none" stroke="url(#gold)" stroke-width="2"/>
                <!-- Coração -->
                <path d="M55,38 C48,38 42,44 42,50 C42,58 55,65 55,65 C55,65 68,58 68,50 C68,44 62,38 55,38Z" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
                <!-- Casa -->
                <polygon points="25,75 25,60 30,55 35,60 35,75" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
                <line x1="28" y1="67" x2="28" y2="60" stroke="url(#gold)" stroke-width="1"/>
                <line x1="32" y1="67" x2="32" y2="60" stroke="url(#gold)" stroke-width="1"/>
                <line x1="25" y1="60" x2="30" y2="55" stroke="url(#gold)" stroke-width="1"/>
                <line x1="35" y1="60" x2="30" y2="55" stroke="url(#gold)" stroke-width="1"/>
                <!-- Cachorro -->
                <path d="M70,65 C75,60 85,60 90,65 C95,70 95,80 90,85 C85,90 75,90 70,85" fill="none" stroke="url(#gold)" stroke-width="1.5"/>
                <circle cx="85" cy="70" r="2" fill="url(#gold)"/>
                <!-- Pêndulo -->
                <line x1="55" y1="65" x2="55" y2="95" stroke="url(#gold)" stroke-width="1.5"/>
                <circle cx="55" cy="97" r="4" fill="url(#gold)"/>
                <!-- Texto Equilibrium -->
                <text x="120" y="40" font-family="'Times New Roman', serif" font-size="28" font-weight="bold" fill="url(#gold)" letter-spacing="1">Equilibrium</text>
                <!-- Linha separadora -->
                <line x1="120" y1="50" x2="310" y2="50" stroke="url(#gold)" stroke-width="1"/>
                <!-- Texto Terapias -->
                <text x="120" y="70" font-family="'Segoe UI', sans-serif" font-size="12" fill="url(#gold)" letter-spacing="3">TERAPIAS ENERGÉTICAS</text>
            </svg>
        </div>

        <p class="welcome">Bem-vindo ao espaço de organização do grupo</p>

        <a href="login.html" class="btn-acessar">Acessar o Sistema</a>

        <footer>© 2026 Equilibrium Terapias Energéticas. Todos os direitos reservados.</footer>
    </div>
</body>
</html>

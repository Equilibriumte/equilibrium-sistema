<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equilibrium Terapias Energéticas</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #2a1616; 
            background: linear-gradient(135deg, #2a1616 0%, #3d1d5f 50%, #2a1616 100%);
        }
        .container {
            text-align: center;
            padding: 40px;
            max-width: 600px;
            width: 90%;
        }
        .logo {
            max-width: 100%;
            height: auto;
            margin-bottom: 30px;
        }
        .logo-img {
            max-width: 300px;
            width: 100%;
            height: auto;
            border-radius: 8px;
        }
        .welcome {
            color: white;
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 40px;
            opacity: 0.9;
        }
        .btn-acessar {
            display: inline-block;
            background-color: #d4af37;
            color: #2a1616;
            padding: 16px 50px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
        }
        .btn-acessar:hover {
            background-color: #c5a030;
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(212, 175, 55, 0.5);
        }
        footer {
            margin-top: 60px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="Equilibrium.logo.png" alt="Equilibrium Terapias Energéticas" class="logo-img">
        </div>

        <p class="welcome">Bem-vindo ao espaço de organização do grupo</p>

        <a href="login.html" class="btn-acessar">Acessar o Sistema</a>

        <footer>© 2026 Equilibrium Terapias Energéticas. Todos os direitos reservados.</footer>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Equilibrium</title>
    <style>
        body { margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center; background: #2d0b4e; font-family: 'Segoe UI', sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; width: 100%; max-width: 350px; }
        .logo { max-width: 150px; margin-bottom: 20px; }
        h1 { color: #4a1276; font-size: 22px; margin-bottom: 5px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 10px; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: #facc15; }
        .btn-login { width: 100%; padding: 15px; background: #facc15; border: none; border-radius: 10px; color: #2d0b4e; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        .btn-login:hover { background: #fbbf24; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="Equilibrium.logo.png" alt="Logo Equilibrium" class="logo">
        <h1>Sistema Interno</h1>
        <p>Acesso Restrito</p>
        <form onsubmit="event.preventDefault(); window.location.href='novo-cliente.html';">
            <input type="text" placeholder="Usuário" required>
            <input type="password" placeholder="Senha" required>
            <button type="submit" class="btn-login">ENTRAR</button>
        </form>
    </div>
</body>
</html>

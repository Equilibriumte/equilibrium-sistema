<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimentos - Equilibrium</title>
    <style>
        :root {
            --roxo-escuro: #2E1A47;
            --roxo-medio: #4B2C7A;
            --roxo-claro: #7D5BA6;
            --dourado: #C9A227;
            --dourado-claro: #E6C86C;
            --branco: #F9F7F3;
            --cinza: #E8E4E1;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--roxo-escuro) 0%, var(--roxo-medio) 100%);
            color: var(--branco);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--dourado);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        h1 {
            text-align: center;
            color: var(--dourado);
            margin-bottom: 8px;
        }

        .subtitulo {
            text-align: center;
            color: var(--dourado-claro);
            margin-bottom: 28px;
            font-size: 1rem;
        }

        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 32px;
            position: relative;
        }

        .steps::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--roxo-claro);
            z-index: 0;
        }

        .step {
            position: relative;
            z-index: 1;
            text-align: center;
            flex: 1;
        }

        .step .dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--roxo-claro);
            color: var(--branco);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border: 2px solid var(--dourado);
        }

        .step.active .dot {
            background: var(--dourado);
            color: var(--roxo-escuro);
        }

        .step-label {
            display: block;
            margin-top: 6px;
            font-size: 0.85rem;
            color: var(--dourado-claro);
        }

        .step-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .step-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--dourado-claro);
            font-weight: 600;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid var(--dourado);
            background: var(--roxo-escuro);
            color: var(--branco);
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--dourado-claro);
            box-shadow: 0 0 8px rgba(201, 162, 39, 0.4);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        .chakras-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .chakra-btn {
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s, box-shadow 0.2s;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
            font-size: 0.95rem;
        }

        .chakra-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
        }

        .chakra-btn[data-nome="Coronário"] { background: #9b59b6; }
        .chakra-btn[data-nome="Frontal"] { background: #3b82c5; }
        .chakra-btn[data-nome="Laringeo"] { background: #2ecc71; }
        .chakra-btn[data-nome="Cardíaco"] { background: #f1c40f; color: #3d3d3d; text-shadow: none; }
        .chakra-btn[data-nome="Plexo Solar"] { background: #e67e22; }
        .chakra-btn[data-nome="Sacral"] { background: #e74c3c; }
        .chakra-btn[data-nome="Básico"] { background: #c0392b; }

        .botoes-acao {
            display: flex;
            justify-content: space-between;
            margin-top: 28px;
            gap: 12px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 8px;
            border: none;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn-secundario {
            background: transparent;
            border: 1px solid var(--dourado);
            color: var(--dourado);
        }

        .btn-primario {
            background: var(--dourado);
            color: var(--roxo-escuro);
        }

        .btn-desabilitado {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--roxo-escuro);
            border: 1px solid var(--dourado);
            border-radius: 12px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
        }

        .modal h3 {
            margin-top: 0;
            color: var(--dourado);
        }

        .radio-group {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .radio-group label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-weight: 400;
        }

        .mensagem {
            text-align: center;
            padding: 16px;
            border-radius: 8px;
            display: none;
            margin-top: 16px;
        }

        .mensagem.sucesso {
            background: rgba(46, 204, 113, 0.2);
            color: #2ecc71;
            border: 1px solid #2ecc71;
            display: block;
        }

        .mensagem.erro {
            background: rgba(231, 76, 60, 0.2);
            color: #e74c3c;
            border: 1px solid #e74c3c;
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Atendimentos</h1>
        <p class="subtitulo">Sistema Equilibrium - Registro de Sessão</p>

        <div class="steps">
            <div class="step active" id="step-indicador-1">
                <span class="dot">1</span>
                <span class="step-label">Cliente</span>
            </div>
            <div class="step" id="step-indicador-2">
                <span class="dot">2</span>
                <span class="step-label">Chakras</span>
            </div>
            <div class="step" id="step-indicador-3">
                <span class="dot">3</span>
                <span class="step-label">Observações</span>
            </div>
            <div class="step" id="step-indicador-4">
                <span class="dot">4</span>
                <span class="step-label">Salvar</span>
            </div>
        </div>

        <form id="formAtendimento" onsubmit="event.preventDefault();">
            <div class="step-content active" id="step-1">
                <div class="form-group">
                    <label for="cliente">Cliente</label>
                    <select id="cliente" name="cliente" required>
                        <option value="">Selecione um cliente</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="whatsapp">WhatsApp</label>
                    <input type="text" id="whatsapp" name="whatsapp" placeholder="+55 (XX) XXXXX-XXXX" maxlength="17" required>
                </div>
            </div>

            <div class="step-content" id="step-2">
                <div class="form-group">
                    <label>Estado dos Chakras</label>
                    <div class="chakras-grid" id="chakrasContainer">
                        <button type="button" class="chakra-btn" data-nome="Coronário" data-cor="#9b59b6">Coronário</button>
                        <button type="button" class="chakra-btn" data-nome="Frontal" data-cor="#3b82c5">Frontal</button>
                        <button type="button" class="chakra-btn" data-nome="Laringeo" data-cor="#2ecc71">Laringeo</button>
                        <button type="button" class="chakra-btn" data-nome="Cardíaco" data-cor="#f1c40f">Cardíaco</button>
                        <button type="button" class="chakra-btn" data-nome="Plexo Solar" data-cor="#e67e22">Plexo Solar</button>
                        <button type="button" class="chakra-btn" data-nome="Sacral" data-cor="#e74c3c">Sacral</button>
                        <button type="button" class="chakra-btn" data-nome="Básico" data-cor="#c0392b">Básico</button>
                    </div>
                </div>
            </div>

            <div class="step-content" id="step-3">
                <div class="form-group">
                    <label for="observacoes">Observações</label>
                    <textarea id="observacoes" name="observacoes" placeholder="Registre aqui as observações da sessão..."></textarea>
                </div>
            </div>

            <div class="step-content" id="step-4">
                <div class="form-group">
                    <label for="resumo">Resumo do Atendimento</label>
                    <textarea id="resumo" name="resumo" readonly placeholder="Confirme os dados e clique em Salvar..."></textarea>
                </div>
            </div>

            <div class="botoes-acao">
                <button type="button" class="btn btn-secundario" id="btnAnterior" onclick="mudarEtapa(-1)" disabled>Anterior</button>
                <button type="button" class="btn btn-primario" id="btnProximo" onclick="mudarEtapa(1)">Próximo</button>
            </div>
        </form>

        <div class="mensagem" id="mensagem"></div>
    </div>

    <div class="modal-overlay" id="modalChakra">
        <div class="modal">
            <h3 id="modalTitulo">Chakra</h3>
            <div class="form-group">
                <label for="chakraPercentual">Percentual (%)</label>
                <input type="number" id="chakraPercentual" min="0" max="100" placeholder="0 a 100">
            </div>
            <div class="form-group">
                <label>Estado</label>
                <div class="radio-group">
                    <label><input type="radio" name="chakraEstado" value="Hiper"> Hiper</label>
                    <label><input type="radio" name="chakraEstado" value="Hipo"> Hipo</label>
                </div>
            </div>
            <div class="botoes-acao" style="margin-top: 0;">
                <button type="button" class="btn btn-secundario" onclick="fecharModalChakra()">Cancelar</button>
                <button type="button" class="btn btn-primario" onclick="confirmarChakra()">Confirmar</button>
            </div>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script>
        const chakrasState = {
            'Coronário': null,
            'Frontal': null,
            'Laringeo': null,
            'Cardíaco': null,
            'Plexo Solar': null,
            'Sacral': null,
            'Básico': null
        };

        let chakraAtual = null;
        let etapaAtual = 1;
        const totalEtapas = 4;

        function init() {
            carregarClientes();
            aplicarMascaraWhatsApp();
            bindChakras();
        }

        function carregarClientes() {
            const select = document.getElementById('cliente');
            select.innerHTML = '<option value="">Selecione um cliente</option>';

            let clientes = [];
            if (typeof database !== 'undefined' && typeof database.listarClientes === 'function') {
                clientes = database.listarClientes();
            } else if (typeof listarClientes === 'function') {
                clientes = listarClientes();
            }

            if (!Array.isArray(clientes)) {
                clientes = [];
            }

            clientes.forEach(cliente => {
                const nome = typeof cliente === 'string' ? cliente : cliente.nome;
                const id = typeof cliente === 'object' && cliente.id ? cliente.id : nome;
                if (nome) {
                    const option = document.createElement('option');
                    option.value = id;
                    option.textContent = nome;
                    select.appendChild(option);
                }
            });
        }

        function aplicarMascaraWhatsApp() {
            const input = document.getElementById('whatsapp');
            input.addEventListener('input', function () {
                let valor = this.value.replace(/\D/g, '');
                if (valor.length > 13) valor = valor.slice(0, 13);

                if (valor.length > 11) {
                    valor = valor.replace(/^(\d{2})(\d{2})(\d{5})(\d{4})$/, '+55 ($2) $3-$4');
                } else if (valor.length > 9) {
                    valor = valor.replace(/^(\d{2})(\d{2})(\d{4})(\d{4})$/, '+55 ($2) $3-$4');
                } else if (valor.length > 7) {
                    valor = valor.replace(/^(\d{2})(\d{2})(\d{4})(\d{0,4})$/, '+55 ($2) $3-$4');
                } else if (valor.length > 4) {
                    valor = valor.replace(/^(\d{2})(\d{2})(\d{0,4})$/, '+55 ($2) $3');
                } else if (valor.length > 2) {
                    valor = valor.replace(/^(\d{2})(\d{0,2})$/, '+55 ($2');
                } else if (valor.length > 0) {
                    valor = '+55 (' + valor;
                }

                this.value = valor;
            });
        }

        function bindChakras() {
            const botoes = document.querySelectorAll('.chakra-btn');
            botoes.forEach(botao => {
                botao.addEventListener('click', function () {
                    abrirModalChakra(this.dataset.nome, this.dataset.cor);
                });
            });
        }

        function abrirModalChakra(nome, cor) {
            chakraAtual = nome;
            document.getElementById('modalTitulo').textContent = nome;
            document.getElementById('chakraPercentual').value = chakrasState[nome] ? chakrasState[nome].percentual : '';

            const estadoAtual = chakrasState[nome] ? chakrasState[nome].estado : '';
            const radios = document.getElementsByName('chakraEstado');
            radios.forEach(radio => {
                radio.checked = radio.value === estadoAtual;
            });

            document.getElementById('modalChakra').classList.add('active');
        }

        function fecharModalChakra() {
            document.getElementById('modalChakra').classList.remove('active');
            chakraAtual = null;
        }

        function confirmarChakra() {
            const percentual = parseInt(document.getElementById('chakraPercentual').value, 10);
            const radios = document.getElementsByName('chakraEstado');
            let estado = '';
            for (const radio of radios) {
                if (radio.checked) {
                    estado = radio.value;
                    break;
                }
            }

            if (isNaN(percentual) || percentual < 0 || percentual > 100) {
                alert('Informe um percentual válido entre 0 e 100.');
                return;
            }
            if (!estado) {
                alert('Selecione o estado: Hiper ou Hipo.');
                return;
            }

            chakrasState[chakraAtual] = { percentual, estado };
            atualizarBotaoChakra(chakraAtual);
            fecharModalChakra();
        }

        function atualizarBotaoChakra(nome) {
            const dados = chakrasState[nome];
            const botoes = document.querySelectorAll('.chakra-btn');
            botoes.forEach(botao => {
                if (botao.dataset.nome === nome) {
                    botao.textContent = `${nome} - ${dados.percentual}% - ${dados.estado}`;
                }
            });
        }

        function mudarEtapa(direcao) {
            if (!validarEtapa(etapaAtual)) return;

            const novaEtapa = etapaAtual + direcao;
            if (novaEtapa < 1 || novaEtapa > totalEtapas) return;

            document.getElementById(`step-${etapaAtual}`).classList.remove('active');
            document.getElementById(`step-indicador-${etapaAtual}`).classList.remove('active');

            etapaAtual = novaEtapa;

            document.getElementById(`step-${etapaAtual}`).classList.add('active');
            document.getElementById(`step-indicador-${etapaAtual}`).classList.add('active');

            document.getElementById('btnAnterior').disabled = etapaAtual === 1;
            document.getElementById('btnProximo').textContent = etapaAtual === totalEtapas ? 'Salvar' : 'Próximo';

            if (etapaAtual === totalEtapas) {
                gerarResumo();
            }

            if (etapaAtual === totalEtapas && direcao === 1) {
                salvarAtendimento();
            }
        }

        function validarEtapa(etapa) {
            if (etapa === 1) {
                const cliente = document.getElementById('cliente').value.trim();
                const whatsapp = document.getElementById('whatsapp').value.trim();
                if (!cliente) {
                    alert('Selecione um cliente.');
                    return false;
                }
                if (whatsapp.length < 17) {
                    alert('Informe o WhatsApp completo no formato +55 (XX) XXXXX-XXXX.');
                    return false;
                }
            }
            return true;
        }

        function gerarResumo() {
            const cliente = document.getElementById('cliente');
            const nomeCliente = cliente.options[cliente.selectedIndex].text;
            const whatsapp = document.getElementById('whatsapp').value;
            const observacoes = document.getElementById('observacoes').value;

            let resumo = `Cliente: ${nomeCliente}\n`;
            resumo += `WhatsApp: ${whatsapp}\n\n`;
            resumo += 'Chakras:\n';

            for (const [nome, dados] of Object.entries(chakrasState)) {
                if (dados) {
                    resumo += `- ${nome}: ${dados.percentual}% (${dados.estado})\n`;
                } else {
                    resumo += `- ${nome}: não avaliado\n`;
                }
            }

            if (observacoes.trim()) {
                resumo += `\nObservações:\n${observacoes}`;
            }

            document.getElementById('resumo').value = resumo;
        }

        function salvarAtendimento() {
            const cliente = document.getElementById('cliente');
            const nomeCliente = cliente.options[cliente.selectedIndex].text;
            const whatsapp = document.getElementById('whatsapp').value;
            const observacoes = document.getElementById('observacoes').value;

            const chakras = [];
            for (const [nome, dados] of Object.entries(chakrasState)) {
                chakras.push({
                    nome: nome,
                    percentual: dados ? dados.percentual : 0,
                    estado: dados ? dados.estado : 'Não avaliado'
                });
            }

            const atendimento = {
                cliente: nomeCliente,
                whatsapp: whatsapp,
                chakras: chakras,
                observacoes: observacoes,
                data: new Date().toISOString()
            };

            try {
                if (typeof database !== 'undefined' && typeof database.salvarAtendimento === 'function') {
                    database.salvarAtendimento(atendimento);
                } else if (typeof salvarAtendimentoDB === 'function') {
                    salvarAtendimentoDB(atendimento);
                } else {
                    const atendimentos = JSON.parse(localStorage.getItem('atendimentos_equilibrium') || '[]');
                    atendimentos.push(atendimento);
                    localStorage.setItem('atendimentos_equilibrium', JSON.stringify(atendimentos));
                }

                exibirMensagem('Atendimento salvo com sucesso!', 'sucesso');
                setTimeout(() => {
                    document.getElementById('formAtendimento').reset();
                    resetarChakras();
                    etapaAtual = 1;
                    atualizarInterfaceEtapa();
                    document.getElementById('mensagem').className = 'mensagem';
                }, 2000);
            } catch (erro) {
                exibirMensagem('Erro ao salvar atendimento: ' + erro.message, 'erro');
            }
        }

        function resetarChakras() {
            for (const nome of Object.keys(chakrasState)) {
                chakrasState[nome] = null;
            }
            const botoes = document.querySelectorAll('.chakra-btn');
            botoes.forEach(botao => {
                botao.textContent = botao.dataset.nome;
            });
        }

        function atualizarInterfaceEtapa() {
            for (let i = 1; i <= totalEtapas; i++) {
                document.getElementById(`step-${i}`).classList.toggle('active', i === etapaAtual);
                document.getElementById(`step-indicador-${i}`).classList.toggle('active', i === etapaAtual);
            }
            document.getElementById('btnAnterior').disabled = true;
            document.getElementById('btnProximo').textContent = 'Próximo';
        }

        function exibirMensagem(texto, tipo) {
            const mensagem = document.getElementById('mensagem');
            mensagem.textContent = texto;
            mensagem.className = 'mensagem ' + tipo;
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>

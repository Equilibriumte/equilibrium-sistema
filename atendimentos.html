<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atendimentos</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
    body { margin: 0; padding: 20px; background: #f4f6f8; color: #222; }
    h1 { margin-top: 0; color: #1f3a5f; }
    .card {
      background: #fff; border-radius: 10px; padding: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 720px; margin: 0 auto 20px;
    }
    label { display: block; margin: 12px 0 4px; font-weight: bold; }
    input[type="text"], input[type="date"], input[type="number"], textarea, select {
      width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px;
    }
    textarea { min-height: 90px; resize: vertical; }
    .colors { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
    .color-item { display: flex; align-items: center; gap: 6px; }
    button {
      background: #1f3a5f; color: #fff; border: none; padding: 12px 18px;
      border-radius: 6px; font-size: 15px; cursor: pointer; margin-top: 16px;
    }
    button:hover { background: #16314f; }
    #statusNome { font-weight: normal; font-size: 13px; margin-left: 8px; }
    .ok { color: #1a7f37; }
    .erro { color: #c0392b; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Atendimentos</h1>

    <form id="formAtendimento">
      <label for="nomeCliente">
        Nome do Cliente <span id="statusNome">Carregando lista de clientes...</span>
      </label>
      <input type="text" id="nomeCliente" list="listaClientes" autocomplete="off" placeholder="Digite ou selecione o cliente" required />
      <datalist id="listaClientes"></datalist>
      <input type="hidden" id="idCliente" name="idCliente" />

      <label for="dataAtendimento">Data do Atendimento</label>
      <input type="date" id="dataAtendimento" name="dataAtendimento" required />

      <label for="aura">Aura (%)</label>
      <input type="text" id="aura" name="aura" placeholder="Ex.: 80" />

      <label>Cores</label>
      <div class="colors" id="coresContainer">
        <div class="color-item"><input type="checkbox" id="corAzul" name="cores" value="Azul" /><label for="corAzul" style="font-weight:normal">Azul</label></div>
        <div class="color-item"><input type="checkbox" id="corVerde" name="cores" value="Verde" /><label for="corVerde" style="font-weight:normal">Verde</label></div>
        <div class="color-item"><input type="checkbox" id="corAmarelo" name="cores" value="Amarelo" /><label for="corAmarelo" style="font-weight:normal">Amarelo</label></div>
        <div class="color-item"><input type="checkbox" id="corVermelho" name="cores" value="Vermelho" /><label for="corVermelho" style="font-weight:normal">Vermelho</label></div>
        <div class="color-item"><input type="checkbox" id="corRoxo" name="cores" value="Roxo" /><label for="corRoxo" style="font-weight:normal">Roxo</label></div>
      </div>

      <label for="observacoes">Observações</label>
      <textarea id="observacoes" name="observacoes" placeholder="Descreva o atendimento..."></textarea>

      <button type="submit">Salvar Atendimento</button>
    </form>
  </div>

  <script>
    const URL_CLIENTES = "https://script.google.com/macros/s/AKfycby6ijLv0hGmlY561Mn5_4R5XCRTbUsw7JMg5BiqFA3CdMLSfyheFkw2aO4rjHNvFxodAA/exec";
    const URL_ATENDIMENTOS = "https://script.google.com/macros/s/AKfycbzBEYsubmBz6FKNY0S3ZyxBIoAQj60Ob7G73uw-TI118tAjtFXWyK_JVEmxz52y4Yn-/exec";

    let clientesMap = {};

    function setStatusNome(texto, tipo) {
      const span = document.getElementById("statusNome");
      span.textContent = texto;
      span.className = tipo === "ok" ? "ok" : (tipo === "erro" ? "erro" : "");
    }

    function normalizarClientes(dados) {
      const lista = [];
      if (!dados) return lista;

      if (Array.isArray(dados)) {
        if (dados.length && typeof dados[0] === "object" && !Array.isArray(dados[0])) {
          dados.forEach(function (item) {
            const id = item.id || item.ID || item.Id || "";
            const nome = item.nome || item.Nome || item.NOME || item.name || "";
            if (nome) lista.push({ id: String(id), nome: String(nome) });
          });
        } else {
          dados.forEach(function (linha) {
            if (Array.isArray(linha) && linha.length >= 2) {
              lista.push({ id: String(linha[0]), nome: String(linha[1]) });
            } else if (Array.isArray(linha) && linha.length === 1) {
              lista.push({ id: "", nome: String(linha[0]) });
            }
          });
        }
      } else if (typeof dados === "object") {
        const possiveis = dados.clientes || dados.dados || dados.data || dados.rows || [];
        if (Array.isArray(possiveis)) {
          return normalizarClientes(possiveis);
        }
      }
      return lista;
    }

    function preencherDatalist(clientes) {
      const datalist = document.getElementById("listaClientes");
      datalist.innerHTML = "";
      clientesMap = {};

      clientes.forEach(function (c) {
        const option = document.createElement("option");
        option.value = c.nome;
        option.dataset.id = c.id;
        datalist.appendChild(option);
        clientesMap[c.nome] = c.id;
      });
    }

    function carregarClientes() {
      setStatusNome("Carregando lista de clientes...", "");
      const noCache = URL_CLIENTES + (URL_CLIENTES.indexOf("?") === -1 ? "?" : "&") + "_=" + new Date().getTime();

      fetch(noCache, { method: "GET" })
        .then(function (resp) { return resp.json(); })
        .then(function (dados) {
          const clientes = normalizarClientes(dados);
          if (clientes.length === 0) {
            setStatusNome("❌ Erro ao Carregar", "erro");
            return;
          }
          preencherDatalist(clientes);
          setStatusNome("✅ Lista de Clientes Carregada", "ok");
        })
        .catch(function (erro) {
          console.error("Erro ao carregar clientes:", erro);
          setStatusNome("❌ Erro ao Carregar", "erro");
        });
    }

    function vincularIdCliente() {
      const nome = document.getElementById("nomeCliente").value.trim();
      const id = clientesMap[nome] || "";
      document.getElementById("idCliente").value = id;
    }

    function formatarAura() {
      const aura = document.getElementById("aura");
      let valor = aura.value.replace(/[^0-9.,]/g, "").replace(/\./g, ",").trim();
      if (valor && valor.indexOf("%") === -1) {
        valor = valor + "%";
      }
      aura.value = valor;
    }

    document.getElementById("nomeCliente").addEventListener("change", vincularIdCliente);
    document.getElementById("nomeCliente").addEventListener("blur", vincularIdCliente);
    document.getElementById("aura").addEventListener("blur", formatarAura);

    document.getElementById("formAtendimento").addEventListener("submit", function (e) {
      e.preventDefault();
      vincularIdCliente();

      const coresSelecionadas = Array.from(document.querySelectorAll('input[name="cores"]:checked'))
        .map(function (c) { return c.value; })
        .join(", ");

      const payload = {
        idCliente: document.getElementById("idCliente").value,
        nomeCliente: document.getElementById("nomeCliente").value.trim(),
        dataAtendimento: document.getElementById("dataAtendimento").value,
        aura: document.getElementById("aura").value,
        cores: coresSelecionadas,
        observacoes: document.getElementById("observacoes").value
      };

      fetch(URL_ATENDIMENTOS, {
        method: "POST",
        body: JSON.stringify(payload)
      })
        .then(function (resp) { return resp.json(); })
        .then(function (res) {
          alert("Atendimento salvo com sucesso!");
          document.getElementById("formAtendimento").reset();
          setStatusNome("✅ Lista de Clientes Carregada", "ok");
        })
        .catch(function (erro) {
          console.error("Erro ao salvar atendimento:", erro);
          alert("Erro ao salvar atendimento.");
        });
    });

    document.addEventListener("DOMContentLoaded", carregarClientes);
  </script>
</body>
</html>

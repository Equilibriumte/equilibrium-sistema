<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimentos - Equilibrium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background-color: #f4f0fa; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: linear-gradient(180deg, #4b0082 0%, #6a0dad 100%); color: #ffd700; padding: 20px; position: fixed; height: 100vh; }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 12px; margin-bottom: 10px; border-radius: 8px; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,215,0,0.2); color: #ffd700; font-weight: bold; }

        /* Content & Tabs */
        .main-content { margin-left: 250px; flex: 1; padding: 40px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e0d0f0; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #e0d0f0; color: #4b0082; cursor: pointer; border-radius: 8px; font-weight: bold; }
        .tab-btn.active { background: #4b0082; color: #ffd700; }
        .tab-content { display: none; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }

        /* Form Elements */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full { grid-column: span 2; }
        label { display: block; font-weight: bold; color: #4b0082; margin-bottom: 5px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e0d0f0; border-radius: 8px; outline: none; }
        
        /* Chakra Panel */
        .chakra-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .chakra-box { padding: 15px; border-radius: 10px; text-align: center; color: white; cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .chakra-box span { display: block; font-size: 12px; margin-top: 5px; }
        
        /* Cores dos Chakras */
        .violeta { background: #8a2be2; } .indigo { background: #4b0082; } .azul-claro { background: #87ceeb; color: #333; }
        .verde { background: #228b22; } .amarelo { background: #ffd700; color: #333; } .laranja { background: #ff8c00; } .vermelho { background: #ff0000; }

        .btn-save { margin-top: 30px; padding: 15px 40px; background: #ffd700; border: none; border-radius: 10px; color: #4b0082; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Equilibrium</h2>
        <nav>
            <a href="index.html">🏠 Home</a>
            <a href="novo-cliente.html">➕ Novo Cliente</a>
            <a href="clientes.html">📋 Lista de Clientes</a>
            <a href="atendimentos.html" class="active">✨ Atendimentos</a>
        </nav>
    </div>

    <div class="main-content">
        <h1>Novo Atendimento</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'dados')">1. Dados Iniciais</button>
            <button class="tab-btn" onclick="openTab(event, 'analise')">2. Análise Inicial</button>
            <button class="tab-btn" onclick="openTab(event, 'especifico')">3. Específico</button>
            <button class="tab-btn" onclick="openTab(event, 'ambiente')">4. Ambiente</button>
            <button class="tab-btn" onclick="openTab(event, 'busca')">5. Busca</button>
        </div>

        <form id="formAtendimento">
            <!-- Aba 1 -->
            <div id="dados" class="tab-content active">
                <div class="form-grid">
                    <div class="form-group"><label>ID Cliente</label><input type="text" id="idCliente" required></div>
                    <div class="form-group"><label>Nome do Cliente</label><input type="text" id="nomeCliente" required></div>
                    <div class="form-group"><label>Status</label><select id="status"><option>Agendado</option><option>Em Aberto</option><option>Finalizado</option></select></div>
                    <div class="form-group"><label>Tipo</label><select id="tipo"><option>Presencial</option><option>Online</option></select></div>
                    <div class="form-group full"><label>Queixa Principal</label><textarea id="queixaP"></textarea></div>
                </div>
            </div>

            <!-- Aba 2 -->
            <div id="analise" class="tab-content">
                <div class="form-grid">
                    <div class="form-group"><label>Bovis (4 dígitos)</label><input type="number" id="bovis"></div>
                    <div class="form-group"><label>Tamanho Aura (%)</label><select id="auraT"><option>0%</option><option>50%</option><option>100%</option></select></div>
                </div>
                <div class="chakra-container">
                    <div class="chakra-box violeta" onclick="setChakra('coronario', 'Coronário')">Coronário <input type="hidden" id="coronario"><span id="val-coronario"></span></div>
                    <div class="chakra-box indigo" onclick="setChakra('frontal', 'Frontal')">Frontal <input type="hidden" id="frontal"><span id="val-frontal"></span></div>
                    <div class="chakra-box azul-claro" onclick="setChakra('laringeo', 'Laríngeo')">Laríngeo <input type="hidden" id="laringeo"><span id="val-laringeo"></span></div>
                    <div class="chakra-box verde" onclick="setChakra('cardiaco', 'Cardíaco')">Cardíaco <input type="hidden" id="cardiaco"><span id="val-cardiaco"></span></div>
                    <div class="chakra-box amarelo" onclick="setChakra('umbilical', 'Umbilical')">Umbilical <input type="hidden" id="umbilical"><span id="val-umbilical"></span></div>
                    <div class="chakra-box laranja" onclick="setChakra('sacro', 'Sacro')">Sacro <input type="hidden" id="sacro"><span id="val-sacro"></span></div>
                    <div class="chakra-box vermelho" onclick="setChakra('basico', 'Básico')">Básico <input type="hidden" id="basico"><span id="val-basico"></span></div>
                </div>
            </div>

            <!-- Outras abas seguem a mesma lógica... -->
            <div id="especifico" class="tab-content">
                <label>Causa Raiz</label><textarea id="causaRaiz"></textarea>
                <label>Diagnóstico</label><textarea id="diagEspec"></textarea>
            </div>
            
            <div id="ambiente" class="tab-content">
                <label>Endereço do Ambiente</label><input type="text" id="endAmbiente">
                <label>Diagnóstico do Ambiente</label><textarea id="diagAmbiente"></textarea>
            </div>

            <div id="busca" class="tab-content">
                <label>Descrição da Busca</label><textarea id="descBusca"></textarea>
                <button type="submit" class="btn-save">FINALIZAR E SALVAR ATENDIMENTO</button>
            </div>
        </form>
    </div>

    <script>
        function openTab(evt, tabName) {
            var i, tabcontent, tablinks;
            tabcontent = document.getElementsByClassName("tab-content");
            for (i = 0; i < tabcontent.length; i++) tabcontent[i].style.display = "none";
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) tablinks[i].className = tablinks[i].className.replace(" active", "");
            document.getElementById(tabName).style.display = "block";
            evt.currentTarget.className += " active";
        }

        function setChakra(id, nome) {
            let val = prompt(`Digite a porcentagem para o Chakra ${nome}:`);
            if (val !== null) {
                document.getElementById(id).value = val;
                document.getElementById(`val-${id}`).innerText = val + "%";
            }
        }

        document.getElementById('formAtendimento').addEventListener('submit', async (e) => {
            e.preventDefault();
            alert("Salvando atendimento na nova planilha...");
            https://script.google.com/macros/s/AKfycbzBEYsubmBz6FKNY0S3ZyxBIoAQj60Ob7G73uw-TI118tAjtFXWyK_JVEmxz52y4Yn-/exec
            // Aqui entra o fetch para a nova URL do Google Script de Atendimentos
        });
    </script>
</body>
</html>

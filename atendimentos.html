<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimentos - Equilibrium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background-color: #f4f0fa; min-height: 100vh; }
        .sidebar { width: 250px; background: linear-gradient(180deg, #4b0082 0%, #6a0dad 100%); color: #ffd700; padding: 20px; position: fixed; height: 100vh; z-index: 100; }
        .sidebar h2 { text-align: center; margin-bottom: 30px; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px; }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 12px; margin-bottom: 10px; border-radius: 8px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,215,0,0.2); color: #ffd700; font-weight: bold; }
        .main-content { margin-left: 250px; flex: 1; padding: 40px; width: calc(100% - 250px); }
        .tabs-header { display: flex; gap: 5px; margin-bottom: 20px; background: #e0d0f0; padding: 5px; border-radius: 12px; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: #4b0082; cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 12px; transition: 0.3s; white-space: nowrap; }
        .tab-btn.active { background: #4b0082; color: #ffd700; }
        .tab-content { display: none; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .tab-content.active { display: block; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .full { grid-column: span 2; }
        label { display: block; font-weight: bold; color: #4b0082; margin-bottom: 8px; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e0d0f0; border-radius: 8px; outline: none; font-size: 14px; }
        input:focus, select:focus, textarea:focus { border-color: #6a0dad; box-shadow: 0 0 0 2px rgba(106,13,173,0.15); }
        .multi-select-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; padding: 10px; border: 2px solid #e0d0f0; border-radius: 8px; max-height: 150px; overflow-y: auto; }
        .option-item { display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer; padding: 5px; border-radius: 5px; }
        .option-item:hover { background: #f0e6fa; }
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin: 15px 0; }
        .color-btn { padding: 15px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; text-align: center; font-size: 11px; transition: 0.3s; }
        .color-btn:hover { transform: scale(1.03); opacity: 0.9; }
        .color-btn span { display: block; font-size: 15px; margin-top: 5px; }
        .c-coronario { background: #8a2be2; } .c-frontal { background: #4b0082; } .c-laringeo { background: #87ceeb; color: #333; }
        .c-cardiaco { background: #228b22; } .c-umbilical { background: #ffd700; color: #333; } .c-sacro { background: #ff8c00; } .c-basico { background: #ff0000; }
        .d-mental { background: #5dade2; } .d-emocional { background: #ec7063; } .d-espiritual { background: #af7ac5; } .d-fisico { background: #58d68d; }
        .nav-actions { display: flex; justify-content: space-between; margin-top: 30px; gap: 15px; }
        .btn-action { padding: 15px 25px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-save { background: #ffd700; color: #4b0082; flex: 1; }
        .btn-save:hover { background: #e6c200; }
        .btn-next { background: #4b0082; color: white; }
        .btn-next:hover { background: #6a0dad; }
        .section-title { font-weight: bold; color: #4b0082; font-size: 15px; margin-top: 20px; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 2px solid #e0d0f0; }
        @media (max-width: 768px) { .sidebar { width: 200px; } .main-content { margin-left: 200px; padding: 20px; } .form-grid-3 { grid-template-columns: 1fr 1fr; } }
        @media (max-width: 560px) { .sidebar { transform: translateX(-100%); } .main-content { margin-left: 0; padding: 16px; } .form-grid { grid-template-columns: 1fr; } .form-grid-3 { grid-template-columns: 1fr; } .full { grid-column: span 1; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Equilibrium</h2>
        <nav>
            <a href="index.html">🏠 Home</a>
            <a href="agenda.html">📅 Agenda</a>
            <a href="novo-cliente.html">👤 Novo Cliente</a>
            <a href="clientes.html">📋 Lista de Clientes</a>
            <a href="atendimentos.html" class="active">✨ Novo Atendimento</a>
            <a href="lista-atendimentos.html">📜 Lista de Atendimento</a>
            <a href="novo-tratamento.html">🩺 Novo Tratamento</a>
            <a href="lista-tratamentos.html">📋 Lista de Tratamentos</a>
            <a href="agenda-graficos.html">📊 Agenda de Gráficos</a>
            <a href="financeiro.html">💰 Financeiro</a>
        </nav>
    </div>

    <div class="main-content">
        <h1 style="color: #4b0082; margin-bottom: 20px;">Ficha de Atendimento</h1>

        <div class="tabs-header">
            <button class="tab-btn active" onclick="showTab(0)">1. Dados</button>
            <button class="tab-btn" onclick="showTab(1)">2. Inicial</button>
            <button class="tab-btn" onclick="showTab(2)">3. Específico</button>
            <button class="tab-btn" onclick="showTab(3)">4. Ambiente</button>
            <button class="tab-btn" onclick="showTab(4)">5. Busca</button>
            <button class="tab-btn" onclick="showTab(5)">6. Divórcio Energético</button>
        </div>

        <form id="formAtendimento">

            <!-- ==================== TAB 1. DADOS ==================== -->
            <div class="tab-content active">
                <div class="form-grid">
                    <div class="form-group full">
                        <label>Nome do Cliente</label>
                        <input type="text" id="nomeCliente" list="listaClientes" placeholder="Digite para buscar..." required autocomplete="off">
                        <datalist id="listaClientes"></datalist>
                        <input type="hidden" id="idCliente">
                    </div>
                    <div class="form-group"><label>ID Atendimento</label><input type="text" id="idAtendimento" readonly style="font-weight:bold;color:#4b0082;background:#f0e6fa;"></div>
                    <div class="form-group"><label>Data</label><input type="date" id="dataAtend" required></div>
                    <div class="form-group"><label>Status</label><select id="statusSelect"><option value="">Carregando...</option></select></div>
                    <div class="form-group full"><label>Queixa Principal</label><textarea id="queixaP" rows="3"></textarea></div>
                    <div class="form-group full"><label>Queixa Secundária</label><textarea id="queixaS" rows="3"></textarea></div>
                    <div class="form-group full"><label>Análise Preliminar</label><textarea id="analisePreliminar" rows="3"></textarea></div>
                </div>
                <div class="nav-actions">
                    <button type="button" class="btn-action btn-save" onclick="enviarDados()">SALVAR AGORA</button>
                    <button type="button" class="btn-action btn-next" onclick="showTab(1)">PRÓXIMO ➔</button>
                </div>
            </div>

            <!-- ==================== TAB 2. INICIAL ==================== -->
            <div class="tab-content">
                <!-- Linha superior: Bovis, Tamanho Aura, Proteção Aura (menores, lado a lado) -->
                <div class="form-grid-3">
                    <div class="form-group"><label>Bovis</label><input type="number" id="bovis" placeholder="4 dígitos"></div>
                    <div class="form-group"><label>Tamanho Aura</label><input type="text" id="auraT" placeholder="Ex: 80%"></div>
                    <div class="form-group"><label>Proteção Aura</label><input type="text" id="protecaoAura" placeholder="Ex: 100%"></div>
                </div>

                <div class="section-title">🔮 Chakras (%)</div>
                <div class="btn-grid">
                    <button type="button" class="color-btn c-coronario" onclick="setVal(this, 'v-coronario')">Coronário<span id="v-coronario">-</span></button>
                    <button type="button" class="color-btn c-frontal" onclick="setVal(this, 'v-frontal')">Frontal<span id="v-frontal">-</span></button>
                    <button type="button" class="color-btn c-laringeo" onclick="setVal(this, 'v-laringeo')">Laríngeo<span id="v-laringeo">-</span></button>
                    <button type="button" class="color-btn c-cardiaco" onclick="setVal(this, 'v-cardiaco')">Cardíaco<span id="v-cardiaco">-</span></button>
                    <button type="button" class="color-btn c-umbilical" onclick="setVal(this, 'v-umbilical')">Umbilical<span id="v-umbilical">-</span></button>
                    <button type="button" class="color-btn c-sacro" onclick="setVal(this, 'v-sacro')">Sacro<span id="v-sacro">-</span></button>
                    <button type="button" class="color-btn c-basico" onclick="setVal(this, 'v-basico')">Básico<span id="v-basico">-</span></button>
                </div>

                <div class="form-grid" style="margin-top:15px;">
                    <div class="form-group"><label>Cores em Excesso</label><div id="coresExcesso" class="multi-select-container"></div></div>
                    <div class="form-group"><label>Cores em Falta</label><div id="coresFalta" class="multi-select-container"></div></div>
                </div>

                <div class="section-title">🌀 Campos (%)</div>
                <div class="btn-grid">
                    <button type="button" class="color-btn d-mental" onclick="setVal(this, 'v-mental')">Mental<span id="v-mental">-</span></button>
                    <button type="button" class="color-btn d-emocional" onclick="setVal(this, 'v-emocional')">Emocional<span id="v-emocional">-</span></button>
                    <button type="button" class="color-btn d-espiritual" onclick="setVal(this, 'v-espiritual')">Espiritual<span id="v-espiritual">-</span></button>
                    <button type="button" class="color-btn d-fisico" onclick="setVal(this, 'v-fisico')">Físico<span id="v-fisico">-</span></button>
                </div>

                <!-- NOVO: Sistemas, Órgãos, Glândulas (multi-select) -->
                <div class="section-title">🧬 Sistemas, Órgãos e Glândulas</div>
                <div class="form-grid-3">
                    <div class="form-group"><label>Sistemas</label><div id="sistemas" class="multi-select-container"></div></div>
                    <div class="form-group"><label>Órgãos</label><div id="orgaos" class="multi-select-container"></div></div>
                    <div class="form-group"><label>Glândulas</label><div id="glandulas" class="multi-select-container"></div></div>
                </div>

                <div class="form-group full" style="margin-top:15px;"><label>Diagnóstico Inicial</label><textarea id="diagInicial" rows="3"></textarea></div>

                <div class="nav-actions">
                    <button type="button" class="btn-action btn-save" onclick="enviarDados()">SALVAR AGORA</button>
                    <button type="button" class="btn-action btn-next" onclick="showTab(2)">PRÓXIMO ➔</button>
                </div>
            </div>

            <!-- ==================== TAB 3. ESPECÍFICO ==================== -->
            <div class="tab-content">
                <!-- Renomeado: Queixa Específica → Observações -->
                <label>Observações</label><textarea id="observacoes" rows="3"></textarea>
                <label style="margin-top:15px;">Causa Raiz</label><textarea id="causaRaiz" rows="3"></textarea>
                <label style="margin-top:15px;">Crenças</label><textarea id="crencas" rows="3"></textarea>
                <label style="margin-top:15px;">Diagnóstico Específico</label><textarea id="diagEspec" rows="3"></textarea>
                <!-- NOVO: Resultado / Depoimento -->
                <label style="margin-top:15px;">Resultado / Depoimento</label><textarea id="resultDepoimento" rows="3"></textarea>

                <div class="nav-actions">
                    <button type="button" class="btn-action btn-save" onclick="enviarDados()">SALVAR AGORA</button>
                    <button type="button" class="btn-action btn-next" onclick="showTab(3)">PRÓXIMO ➔</button>
                </div>
            </div>

            <!-- ==================== TAB 4. AMBIENTE ==================== -->
            <div class="tab-content">
                <div class="form-grid">
                    <div class="form-group"><label>Tipo Ambiente</label><select id="tipoAmbiente"></select></div>
                    <div class="form-group"><label>Endereço</label><input type="text" id="endAmbiente"></div>
                    <div class="form-group full"><label>Queixa Ambiente</label><textarea id="queixaAmbiente" rows="3"></textarea></div>
                    <div class="form-group full"><label>Pessoas Env.</label><input type="text" id="pessoasEnv"></div>
                    <div class="form-group full"><label>Diag. Ambiente</label><textarea id="diagAmbiente" rows="3"></textarea></div>
                </div>
                <div class="nav-actions">
                    <button type="button" class="btn-action btn-save" onclick="enviarDados()">SALVAR AGORA</button>
                    <button type="button" class="btn-action btn-next" onclick="showTab(4)">PRÓXIMO ➔</button>
                </div>
            </div>

            <!-- ==================== TAB 5. BUSCA ==================== -->
            <div class="tab-content">
                <div class="form-grid">
                    <div class="form-group"><label>Tipo Busca</label><select id="tipoBusca"></select></div>
                    <div class="form-group"><label>Info Busca</label><input type="text" id="infoBusca"></div>
                    <div class="form-group full"><label>Resultado</label><select id="resBusca"></select></div>
                    <div class="form-group full"><label>Descrição</label><textarea id="descBusca" rows="3"></textarea></div>
                </div>
                <div class="nav-actions">
                    <button type="button" class="btn-action btn-save" onclick="enviarDados()">FINALIZAR E SALVAR</button>
                    <button type="button" class="btn-action btn-next" onclick="showTab(5)">PRÓXIMO ➔</button>
                </div>
            </div>

            <!-- ==================== TAB 6. DIVÓRCIO ENERGÉTICO (NOVA) ==================== -->
            <div class="tab-content">
                <div class="form-grid">
                    <div class="form-group full"><label>Diagnóstico</label><textarea id="divorcioDiag" rows="3"></textarea></div>
                    <div class="form-group full"><label>Tratamento</label><textarea id="divorcioTrat" rows="3"></textarea></div>
                    <div class="form-group full"><label>Observação</label><textarea id="divorcioObs" rows="3"></textarea></div>
                </div>
                <div class="nav-actions">
                    <button type="button" class="btn-action btn-save" onclick="enviarDados()">FINALIZAR E SALVAR</button>
                </div>
            </div>

        </form>
    </div>

    <script>
        const URL_CLIENTES = 'https://script.google.com/macros/s/AKfycbx-uKmdoSwoTelfZsl_Mjx0dCOE2uVdowAOyg9L0u23te_g7getcZAhKMtrRQ5f3pi0/exec';
        const URL_ATEND = 'https://script.google.com/macros/s/AKfycbx-uKmdoSwoTelfZsl_Mjx0dCOE2uVdowAOyg9L0u23te_g7getcZAhKMtrRQ5f3pi0/exec';
        let listaGlobalClientes = [];

        function extrairNomeCliente(obj) {
            if (!obj) return '';
            const alvos = ['nome', 'cliente', 'nomecliente', 'nome_cliente', 'nome completo', 'nomecompleto'];
            const chaves = Object.keys(obj);
            for (const chave of chaves) {
                const norm = chave.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, '');
                for (const alvo of alvos) {
                    if (norm === alvo) return obj[chave];
                }
            }
            return '';
        }

        function extrairIdCliente(obj) {
            if (!obj) return '';
            const alvos = ['id', 'idcliente', 'clienteid', 'codigo', 'código'];
            const chaves = Object.keys(obj);
            for (const chave of chaves) {
                const norm = chave.toLowerCase().trim().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, '');
                for (const alvo of alvos) {
                    if (norm === alvo) return obj[chave];
                }
            }
            return '';
        }

        function gerarIdAtendimento() {
            let id = localStorage.getItem('atualIdAtendimento');
            if (!id) {
                id = 'ATEND-0000001';
            }
            document.getElementById('idAtendimento').value = id;
        }

        function showTab(i) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content')[i].classList.add('active');
            document.querySelectorAll('.tab-btn')[i].classList.add('active');
            window.scrollTo(0,0);
        }

        function setVal(btn, id) {
            const v = prompt("Digite a %:");
            if (v) document.getElementById(id).innerText = v + "%";
        }

        async function carregarTudo() {
            try {
                const resC = await fetch(URL_CLIENTES + "?_=" + new Date().getTime());
                const jsonC = await resC.json();
                listaGlobalClientes = Array.isArray(jsonC) ? jsonC : (jsonC.data || jsonC.dados || []);
                const dl = document.getElementById('listaClientes');
                dl.innerHTML = "";
                listaGlobalClientes.forEach(c => {
                    let o = document.createElement('option');
                    o.value = extrairNomeCliente(c);
                    dl.appendChild(o);
                });

                const resA = await fetch(URL_ATEND);
                const jsonA = await resA.json();
                const config = jsonA.configuracoes || {};

                const fillS = (id, list) => {
                    const s = document.getElementById(id);
                    if(!s) return;
                    s.innerHTML = "<option value=''>Selecione...</option>";
                    if(list) list.forEach(v => { let o = document.createElement('option'); o.value = v; o.text = v; s.appendChild(o); });
                };
                const fillM = (id, list, pref) => {
                    const c = document.getElementById(id);
                    if(!c) return;
                    c.innerHTML = "";
                    if(list) list.forEach(v => {
                        const l = document.createElement('label');
                        l.className = 'option-item';
                        l.innerHTML = `<input type="checkbox" name="${pref}" value="${v}"> ${v}`;
                        c.appendChild(l);
                    });
                };

                const findKey = (obj, target) => Object.keys(obj).find(k => k.toLowerCase() === target.toLowerCase());

                fillM('coresExcesso', config[findKey(config, 'cores')], 'exc');
                fillM('coresFalta', config[findKey(config, 'cores')], 'fal');
                fillS('statusSelect', config[findKey(config, 'status')]);
                fillS('tipoAmbiente', config[findKey(config, 'ambientes')]);
                fillS('tipoBusca', config[findKey(config, 'buscaTipos')]);
                fillS('resBusca', config[findKey(config, 'buscaResultados')]);

                // NOVO: Carrega Sistemas, Órgãos e Glândulas da planilha (colunas G, H, I)
                fillM('sistemas', config[findKey(config, 'sistemas')], 'sis');
                // Tenta encontrar como 'órgãos' ou 'orgaos'
                let orgaosKey = findKey(config, 'órgãos') || findKey(config, 'orgaos') || findKey(config, 'orgãos');
                fillM('orgaos', config[orgaosKey], 'org');
                let glandulasKey = findKey(config, 'glândulas') || findKey(config, 'glandulas');
                fillM('glandulas', config[glandulasKey], 'gla');

            } catch (e) { console.error("Erro no carregamento:", e); }
        }

        document.getElementById('nomeCliente').oninput = (e) => {
            const digitado = e.target.value;
            const c = listaGlobalClientes.find(x => extrairNomeCliente(x) === digitado);
            if (c) document.getElementById('idCliente').value = extrairIdCliente(c);
        };

        async function enviarDados() {
            const getC = (n) => Array.from(document.querySelectorAll(`input[name="${n}"]:checked`)).map(cb => cb.value).join(", ");

            const p = {
                'ID Atendimento': document.getElementById('idAtendimento').value,
                'Data do Atendimento': document.getElementById('dataAtend').value,
                'ID Cliente': document.getElementById('idCliente').value,
                'Nome Cliente': document.getElementById('nomeCliente').value,
                'Status': document.getElementById('statusSelect').value,
                'Queixa Principal': document.getElementById('queixaP').value,
                'Queixa Secundária': document.getElementById('queixaS').value,
                'Análise Preliminar': document.getElementById('analisePreliminar').value,
                'Bovis': document.getElementById('bovis').value,
                'Coronário': document.getElementById('v-coronario').innerText,
                'Frontal': document.getElementById('v-frontal').innerText,
                'Laríngeo': document.getElementById('v-laringeo').innerText,
                'Cardíaco': document.getElementById('v-cardiaco').innerText,
                'Umbilical': document.getElementById('v-umbilical').innerText,
                'Sacro': document.getElementById('v-sacro').innerText,
                'Básico': document.getElementById('v-basico').innerText,
                'Tamanho Aura': document.getElementById('auraT').value,
                'Proteção Aura': document.getElementById('protecaoAura').value,
                'Cores Excesso': getC('exc'),
                'Cores Falta': getC('fal'),
                'Mental': document.getElementById('v-mental').innerText,
                'Emocional': document.getElementById('v-emocional').innerText,
                'Espiritual': document.getElementById('v-espiritual').innerText,
                'Físico': document.getElementById('v-fisico').innerText,
                'Diagnóstico Inicial': document.getElementById('diagInicial').value,
                // Renomeado na interface, mas mantém a chave 'Queixa Espec.' para compatibilidade com a coluna existente
                'Queixa Espec.': document.getElementById('observacoes').value,
                'Causa Raiz': document.getElementById('causaRaiz').value,
                'Crenças': document.getElementById('crencas').value,
                'Diagnóstico Específico': document.getElementById('diagEspec').value,
                // NOVO: Resultado / Depoimento
                'Resultado/Depoimento': document.getElementById('resultDepoimento').value,
                'Tipo Ambiente': document.getElementById('tipoAmbiente').value,
                'Endereço Ambiente': document.getElementById('endAmbiente').value,
                'Queixa Ambiente': document.getElementById('queixaAmbiente').value,
                'Pessoas Envolvidas': document.getElementById('pessoasEnv').value,
                'Diagnóstico Ambiente': document.getElementById('diagAmbiente').value,
                'Tipo Busca': document.getElementById('tipoBusca').value,
                'Descrição Busca': document.getElementById('descBusca').value,
                'Info Busca': document.getElementById('infoBusca').value,
                'Resultado Busca': document.getElementById('resBusca').value,
                // NOVO: Sistemas, Órgãos, Glândulas
                'Sistemas': getC('sis'),
                'Órgãos': getC('org'),
                'Glândulas': getC('gla'),
                // NOVO: Divórcio Energético
                'Divórcio Energético Diagnóstico': document.getElementById('divorcioDiag').value,
                'Divórcio Energético Tratamento': document.getElementById('divorcioTrat').value,
                'Divórcio Energético Observação': document.getElementById('divorcioObs').value
            };

            try {
                await fetch(URL_ATEND, { 
                    method: 'POST', 
                    body: JSON.stringify(p),
                    redirect: 'follow'
                });
            } catch (e) { 
                console.warn('Redirect ignorado, dados salvos.');
            }

            // Gera o próximo ID para a próxima vez que abrir a página
            let num = parseInt(document.getElementById('idAtendimento').value.split('-')[1], 10);
            num++;
            let novo = 'ATEND-' + num.toString().padStart(7, '0');
            localStorage.setItem('atualIdAtendimento', novo);
            alert("✅ Atendimento salvo com sucesso!");
            location.reload();
        }

        window.onload = function() {
            gerarIdAtendimento();
            carregarTudo();
        };
    </script>
</body>
</html>

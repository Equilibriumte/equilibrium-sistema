<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cliente - Equilibrium</title>
    <script src="js/database.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f8f9fa; display: flex; justify-content: center; padding: 40px 20px; }
        .card { background: white; width: 100%; max-width: 650px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 40px; }
        .header h1 { color: #4B0082; font-size: 28px; font-weight: bold; margin-bottom: 5px; }
        .header p { color: #888; font-size: 15px; margin-bottom: 30px; }
        .section-title { color: #4B0082; font-size: 18px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #4B0082; margin-bottom: 8px; }
        input { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; font-size: 14px; outline: none; transition: 0.2s; }
        input:focus { border-color: #4B0082; box-shadow: 0 0 0 3px rgba(75, 0, 130, 0.1); }
        .row-address { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 12px; }
        .row-city { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn-save { width: 100%; padding: 15px; background: #4B0082; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.3s; }
        .btn-save:hover { background: #36005e; transform: translateY(-2px); }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>Novo Cliente</h1>
            <p>Preencha os dados para cadastrar</p>
        </div>
        
        <div class="section-title">📋 Dados Pessoais</div>
        
        <form id="formCliente" onsubmit="enviarFormulario(event)">
            <div class="form-group">
                <label>Nome completo *</label>
                <input type="text" id="nome" placeholder="Nome completo do cliente" required>
            </div>
            
            <div class="form-group">
                <label>WhatsApp *</label>
                <input type="text" id="whatsapp" placeholder="+55 (XX) XXXXX-XXXX" required>
            </div>
            
            <div class="row-city">
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" placeholder="cliente@email.com" required>
                </div>
                <div class="form-group">
                    <label>Instagram</label>
                    <input type="text" id="instagram" placeholder="@usuario">
                </div>
            </div>
            
            <label style="margin-top: 10px; display: block; font-size: 14px; font-weight: 600; color: #4B0082; margin-bottom: 8px;">Endereço</label>
            <div class="row-address">
                <div class="form-group"><input type="text" id="rua" placeholder="Rua"></div>
                <div class="form-group"><input type="text" id="numero" placeholder="N°"></div>
                <div class="form-group"><input type="text" id="bairro" placeholder="Bairro"></div>
            </div>
            
            <div class="row-city">
                <div class="form-group"><input type="text" id="cidade" placeholder="Cidade"></div>
                <div class="form-group"><input type="text" id="estado" placeholder="Estado"></div>
            </div>
            
            <div class="form-group">
                <input type="text" id="cep" placeholder="CEP">
            </div>
            
            <div class="form-group">
                <label>Data de nascimento</label>
                <input type="date" id="nascimento">
            </div>
            
            <div class="form-group">
                <label>Indicação</label>
                <input type="text" id="indicacao" placeholder="Quem indicou?">
            </div>
            
            <button type="submit" id="btnSalvar" class="btn-save">Salvar Cliente</button>
        </form>
    </div>

    <script>
        // Máscara de WhatsApp +55 (XX) XXXXX-XXXX
        document.getElementById('whatsapp').addEventListener('input', function (e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 13) v = v.slice(0, 13);
            if (v.length > 2) {
                let x = v.match(/(\d{2})(\d{2})(\d{5})(\d{4})/);
                if (x) e.target.value = '+55 (' + x[2] + ') ' + x[3] + '-' + x[4];
            }
        });

        async function enviarFormulario(event) {
            event.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;
            btn.innerText = "Salvando na nuvem...";

            const dados = {
                nome: document.getElementById('nome').value,
                whatsapp: document.getElementById('whatsapp').value,
                email: document.getElementById('email').value,
                instagram: document.getElementById('instagram').value,
                rua: document.getElementById('rua').value,
                numero: document.getElementById('numero').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                estado: document.getElementById('estado').value,
                cep: document.getElementById('cep').value,
                nascimento: document.getElementById('nascimento').value,
                indicacao: document.getElementById('indicacao').value,
                dataCadastro: new Date().toISOString()
            };

            try {
                if (typeof window.salvarCliente === 'function') {
                    await window.salvarCliente(dados);
                    alert("✅ Cliente salvo com sucesso!");
                    window.location.href = 'clientes.html';
                } else {
                    throw new Error("Função de salvamento não encontrada.");
                }
            } catch (error) {
                console.error(error);
                alert("❌ Erro ao salvar. Verifique se o arquivo js/database.js está correto.");
                btn.disabled = false;
                btn.innerText = "Salvar Cliente";
            }
        }
    </script>
</body>
</html>

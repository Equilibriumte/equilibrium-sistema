<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Novo Cliente - Equilibrium</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f3fa;
      color: #2d2d2d;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(90deg, #5b2c6f 0%, #7d3c98 100%);
      color: #f1c40f;
      padding: 1.2rem 1rem;
      text-align: center;
      box-shadow: 0 4px 12px rgba(91, 44, 111, 0.25);
      border-bottom: 4px solid #d4ac0d;
    }

    header h1 {
      font-size: 1.6rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
    }

    header p {
      font-size: 0.9rem;
      color: #f9e79f;
      margin-top: 0.3rem;
    }

    .container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.08);
      padding: 2rem;
      border-top: 5px solid #7d3c98;
    }

    .card h2 {
      color: #5b2c6f;
      margin-bottom: 1.5rem;
      font-size: 1.3rem;
      border-bottom: 2px solid #d4ac0d;
      display: inline-block;
      padding-bottom: 0.4rem;
    }

    form {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.1rem;
    }

    @media (min-width: 600px) {
      form {
        grid-template-columns: 1fr 1fr;
      }

      .full-width {
        grid-column: 1 / -1;
      }
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.4rem;
      color: #5b2c6f;
      font-size: 0.9rem;
    }

    input[type="text"],
    input[type="email"],
    input[type="date"],
    input[type="number"] {
      width: 100%;
      padding: 0.75rem;
      border: 1px solid #d5d8dc;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #7d3c98;
      box-shadow: 0 0 0 3px rgba(125, 60, 152, 0.15);
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .btn {
      padding: 0.85rem 1.8rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn-primary {
      background: #d4ac0d;
      color: #4a235a;
    }

    .btn-primary:hover:not(:disabled) {
      background: #b7950b;
    }

    .btn-secondary {
      background: #ecf0f1;
      color: #5b2c6f;
    }

    .btn-secondary:hover {
      background: #d5dbdb;
    }

    .btn:disabled {
      opacity: 0.8;
      cursor: wait;
    }

    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid #4a235a;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 0.5rem;
      vertical-align: middle;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <header>
    <h1>Equilibrium</h1>
    <p>Cadastro de Novo Cliente</p>
  </header>

  <div class="container">
    <div class="card">
      <h2>Informações do Cliente</h2>
      <form id="formCliente" onsubmit="enviarFormulario(event)">
        <div>
          <label for="nome">Nome</label>
          <input type="text" id="nome" name="nome" required>
        </div>

        <div>
          <label for="whatsapp">WhatsApp</label>
          <input type="text" id="whatsapp" name="whatsapp" placeholder="+55 (XX) XXXXX-XXXX" required maxlength="20">
        </div>

        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>

        <div>
          <label for="instagram">Instagram</label>
          <input type="text" id="instagram" name="instagram" placeholder="@usuario">
        </div>

        <div class="full-width">
          <label for="rua">Rua</label>
          <input type="text" id="rua" name="rua" required>
        </div>

        <div>
          <label for="numero">Número</label>
          <input type="text" id="numero" name="numero" required>
        </div>

        <div>
          <label for="bairro">Bairro</label>
          <input type="text" id="bairro" name="bairro" required>
        </div>

        <div>
          <label for="cidade">Cidade</label>
          <input type="text" id="cidade" name="cidade" required>
        </div>

        <div>
          <label for="estado">Estado</label>
          <input type="text" id="estado" name="estado" required maxlength="2" placeholder="SP">
        </div>

        <div>
          <label for="cep">CEP</label>
          <input type="text" id="cep" name="cep" required maxlength="9" placeholder="00000-000">
        </div>

        <div>
          <label for="nascimento">Nascimento</label>
          <input type="date" id="nascimento" name="nascimento" required>
        </div>

        <div>
          <label for="indicacao">Indicação</label>
          <input type="text" id="indicacao" name="indicacao" placeholder="Quem indicou?">
        </div>

        <div class="actions full-width">
          <a href="clientes.html" class="btn btn-secondary">Cancelar</a>
          <button type="submit" id="btnSalvar" class="btn btn-primary">Salvar Cliente</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/database.js"></script>
  <script>
    const inputWhatsapp = document.getElementById('whatsapp');

    inputWhatsapp.addEventListener('input', function (event) {
      let value = event.target.value.replace(/\D/g, '');

      if (!value.startsWith('55')) {
        value = '55' + value;
      }

      if (value.length > 13) {
        value = value.slice(0, 13);
      }

      let formatted = '+55 ';
      if (value.length > 2) {
        formatted += '(' + value.slice(2, 4) + ')';
      }
      if (value.length > 4) {
        formatted += ' ' + value.slice(4, 9);
      }
      if (value.length > 9) {
        formatted += '-' + value.slice(9, 13);
      }

      event.target.value = formatted.trim();
    });

    function enviarFormulario(event) {
      event.preventDefault();

      const botao = document.getElementById('btnSalvar');
      const textoOriginal = botao.innerHTML;

      botao.disabled = true;
      botao.innerHTML = '<span class="spinner"></span> Salvando na nuvem...';

      const dados = {
        nome: document.getElementById('nome').value.trim(),
        whatsapp: document.getElementById('whatsapp').value.trim(),
        email: document.getElementById('email').value.trim(),
        instagram: document.getElementById('instagram').value.trim(),
        rua: document.getElementById('rua').value.trim(),
        numero: document.getElementById('numero').value.trim(),
        bairro: document.getElementById('bairro').value.trim(),
        cidade: document.getElementById('cidade').value.trim(),
        estado: document.getElementById('estado').value.trim(),
        cep: document.getElementById('cep').value.trim(),
        nascimento: document.getElementById('nascimento').value,
        indicacao: document.getElementById('indicacao').value.trim()
      };

      try {
        if (typeof window.salvarCliente === 'function') {
          window.salvarCliente(dados);
        } else {
          console.error('Função window.salvarCliente não foi encontrada. Verifique js/database.js.');
          alert('Erro ao salvar: função de persistência não disponível.');
          botao.disabled = false;
          botao.innerHTML = textoOriginal;
          return;
        }

        window.location.href = 'clientes.html';
      } catch (erro) {
        console.error('Erro ao salvar cliente:', erro);
        alert('Ocorreu um erro ao salvar. Tente novamente.');
        botao.disabled = false;
        botao.innerHTML = textoOriginal;
      }
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cliente</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4a148c 0%, #7b1fa2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
        }

        h1 {
            color: #4a148c;
            text-align: center;
            margin-bottom: 8px;
            font-size: 1.75rem;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        form label {
            display: block;
            color: #4a148c;
            font-weight: 600;
            margin-bottom: 6px;
        }

        form input {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 18px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        form input:focus {
            outline: none;
            border-color: #ffd700;
            box-shadow: 0 0 0 3px rgba(255, 215, 0, 0.25);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: #ffd700;
            color: #4a148c;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover:not(:disabled) {
            background: #ffdf33;
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        button:disabled {
            background: #d4b800;
            cursor: not-allowed;
            opacity: 0.85;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 18px;
            color: #4a148c;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Novo Cliente</h1>
        <p class="subtitle">Preencha os dados para cadastrar</p>

        <form id="formCliente" onsubmit="event.preventDefault(); enviarFormulario();">
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome" placeholder="Digite o nome completo" required>

            <label for="whatsapp">WhatsApp</label>
            <input type="text" id="whatsapp" name="whatsapp" placeholder="(00) 00000-0000" maxlength="15" required>

            <button type="submit" id="btnSalvar">Salvar Cliente</button>
        </form>

        <a href="clientes.html" class="back-link">Voltar para lista de clientes</a>
    </div>

    <script src="js/database.js"></script>
    <script>
    // MÁSCARA DE WHATSAPP
    const handlePhone = (event) => {
        let input = event.target;
        input.value = phoneMask(input.value);
    }

    const phoneMask = (value) => {
        if (!value) return "";
        value = value.replace(/\D/g, '');
        value = value.replace(/(\d{2})(\d)/, "($1) $2");
        value = value.replace(/(\d{5})(\d)/, "$1-$2");
        return value;
    }

    document.getElementById('whatsapp').addEventListener('input', handlePhone);

    // FUNÇÃO PARA SALVAR
    async function enviarFormulario(event) {
        event.preventDefault();
        
        const btn = document.getElementById('btnSalvar');
        const feedback = document.getElementById('feedback');
        
        btn.disabled = true;
        btn.textContent = "Salvando na nuvem...";

        const dados = {
            nome: document.getElementById('nome').value,
            whatsapp: document.getElementById('whatsapp').value,
            email: document.getElementById('email').value,
            instagram: document.getElementById('instagram').value,
            rua: document.getElementById('rua').value,
            numero: document.getElementById('numero').value,
            bairro: document.getElementById('bairro').value,
            cidade: document.getElementById('cidade').value,
            estado: document.getElementById('estado').value,
            cep: document.getElementById('cep').value,
            nascimento: document.getElementById('nascimento').value,
            indicacao: document.getElementById('indicacao').value,
            dataCadastro: new Date().toLocaleDateString('pt-BR')
        };

        try {
            // Chama a função que está no js/database.js
            await salvarCliente(dados);
            alert("✅ Cliente salvo com sucesso na planilha!");
            window.location.href = 'clientes.html';
        } catch (error) {
            console.error(error);
            alert("❌ Erro ao salvar. Verifique sua conexão.");
        } finally {
            btn.disabled = false;
            btn.textContent = "Salvar Cliente";
        }
    }
</script>
</body>
</html>

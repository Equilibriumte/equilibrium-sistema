<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cliente - Equilibrium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background-color: #f4f0fa; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: linear-gradient(180deg, #4b0082 0%, #6a0dad 100%); color: #ffd700; padding: 20px; position: fixed; height: 100vh; }
        .sidebar h2 { margin-bottom: 30px; text-align: center; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px; }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 12px; margin-bottom: 10px; border-radius: 8px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,215,0,0.2); color: #ffd700; font-weight: bold; }

        /* Content */
        .main-content { margin-left: 250px; flex: 1; padding: 40px; }
        .form-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 800px; margin: auto; }
        h1 { color: #4b0082; margin-bottom: 25px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        
        .form-group { display: flex; flex-direction: column; }
        label { font-weight: bold; color: #4b0082; margin-bottom: 5px; font-size: 14px; }
        input { padding: 12px; border: 2px solid #e0d0f0; border-radius: 8px; outline: none; transition: 0.3s; }
        input:focus { border-color: #ffd700; }
        
        .btn-save { grid-column: span 2; padding: 15px; background: #ffd700; border: none; border-radius: 10px; color: #4b0082; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-save:hover { background: #ffb300; transform: translateY(-2px); }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Equilibrium</h2>
        <nav>
            <a href="index.html">🏠 Home</a>
            <a href="novo-cliente.html" class="active">➕ Novo Cliente</a>
            <a href="clientes.html">📋 Lista de Clientes</a>
        </nav>
    </div>

    <div class="main-content">
        <div class="form-card">
            <h1>Cadastrar Novo Cliente</h1>
            <form id="formCliente">
                <div class="form-grid">
                    <div class="form-group full-width">
                        <label>Nome Completo</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="form-group">
                        <label>Nascimento</label>
                        <input type="date" id="nascimento">
                    </div>
                    <div class="form-group">
                        <label>WhatsApp</label>
                        <input type="text" id="whatsapp" required placeholder="(00) 00000-0000">
                    </div>
                    <div class="form-group">
                        <label>E-mail</label>
                        <input type="email" id="email">
                    </div>
                    <div class="form-group">
                        <label>Instagram</label>
                        <input type="text" id="instagram" placeholder="@usuario">
                    </div>
                    <div class="form-group">
                        <label>Rua</label>
                        <input type="text" id="rua">
                    </div>
                    <div class="form-group">
                        <label>Número</label>
                        <input type="text" id="numero">
                    </div>
                    <div class="form-group">
                        <label>Bairro</label>
                        <input type="text" id="bairro">
                    </div>
                    <div class="form-group">
                        <label>Cidade</label>
                        <input type="text" id="cidade">
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <input type="text" id="estado" maxlength="2" placeholder="UF">
                    </div>
                    <div class="form-group">
                        <label>CEP</label>
                        <input type="text" id="cep">
                    </div>
                    <div class="form-group full-width">
                        <label>Indicação</label>
                        <input type="text" id="indicacao">
                    </div>
                    <button type="submit" id="btnSalvar" class="btn-save">SALVAR CLIENTE</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script>
        document.getElementById('formCliente').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;
            btn.innerText = "Salvando na nuvem...";

            const dados = {
                nome: document.getElementById('nome').value,
                nascimento: document.getElementById('nascimento').value,
                whatsapp: document.getElementById('whatsapp').value,
                email: document.getElementById('email').value,
                instagram: document.getElementById('instagram').value,
                rua: document.getElementById('rua').value,
                numero: document.getElementById('numero').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                estado: document.getElementById('estado').value,
                cep: document.getElementById('cep').value,
                indicacao: document.getElementById('indicacao').value
            };

            try {
                if (typeof window.salvarCliente === 'function') {
                    await window.salvarCliente(dados);
                    alert("✅ Sucesso! Cliente cadastrado com ID automático.");
                    window.location.href = 'clientes.html';
                } else {
                    throw new Error("Motor de banco de dados não carregado.");
                }
            } catch (err) {
                alert("❌ Erro ao salvar: " + err.message);
                btn.disabled = false;
                btn.innerText = "SALVAR CLIENTE";
            }
        });
    </script>
</body>
</html>

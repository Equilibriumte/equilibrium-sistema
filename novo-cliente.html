<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cliente</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background-color: #f4f0fa;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            background: linear-gradient(180deg, #4b0082 0%, #6a0dad 100%);
            color: #ffd700;
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            box-shadow: 2px 0 10px rgba(0, 0, 0, 0.2);
        }

        .sidebar-header {
            padding: 0 20px 20px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.3);
            margin-bottom: 20px;
        }

        .sidebar-header h2 {
            font-size: 22px;
            color: #ffd700;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #e0d0f0;
            margin-top: 4px;
        }

        .sidebar nav {
            flex: 1;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: #fff;
            text-decoration: none;
            font-size: 15px;
            transition: all 0.2s ease;
            border-left: 4px solid transparent;
        }

        .sidebar nav a:hover {
            background-color: rgba(255, 215, 0, 0.15);
            color: #ffd700;
            border-left-color: #ffd700;
        }

        .sidebar nav a.active {
            background-color: rgba(255, 215, 0, 0.2);
            color: #ffd700;
            border-left-color: #ffd700;
        }

        .sidebar nav a .icon {
            width: 20px;
            text-align: center;
            font-size: 18px;
        }

        .sidebar-footer {
            padding: 15px 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.3);
            font-size: 12px;
            color: #e0d0f0;
        }

        /* Main Content */
        .main-content {
            margin-left: 250px;
            flex: 1;
            padding: 30px 40px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            color: #4b0082;
            font-size: 28px;
        }

        .page-header .btn-back {
            background-color: #6a0dad;
            color: #fff;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .page-header .btn-back:hover {
            background-color: #4b0082;
        }

        /* Form Card */
        .form-card {
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 2px 12px rgba(75, 0, 130, 0.1);
            max-width: 700px;
        }

        .form-card h2 {
            color: #4b0082;
            margin-bottom: 25px;
            font-size: 20px;
            border-bottom: 2px solid #ffd700;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            color: #4b0082;
            font-weight: 600;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e0d0f0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
            background: #faf8ff;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #6a0dad;
            background: #fff;
        }

        .form-row {
            display: flex;
            gap: 20px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .form-row .form-group.small {
            flex: 0 0 120px;
        }

        .btn-submit {
            background: linear-gradient(135deg, #6a0dad 0%, #4b0082 100%);
            color: #ffd700;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(75, 0, 130, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .message {
            padding: 12px 18px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .message.success {
            background-color: #e6ffe6;
            color: #2d8a2d;
            border: 1px solid #a0d8a0;
            display: block;
        }

        .message.error {
            background-color: #ffe6e6;
            color: #c62828;
            border: 1px solid #f0a0a0;
            display: block;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 60px;
            }
            .sidebar-header h2,
            .sidebar-header p,
            .sidebar nav a span,
            .sidebar-footer {
                display: none;
            }
            .main-content {
                margin-left: 60px;
                padding: 20px;
            }
            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>CRM System</h2>
            <p>Painel de Gestão</p>
        </div>
        <nav>
            <a href="dashboard.html">
                <span class="icon">📊</span>
                <span>Dashboard</span>
            </a>
            <a href="listagem.html" class="active">
                <span class="icon">👥</span>
                <span>Clientes</span>
            </a>
            <a href="novo-cliente.html">
                <span class="icon">➕</span>
                <span>Novo Cliente</span>
            </a>
            <a href="produtos.html">
                <span class="icon">📦</span>
                <span>Produtos</span>
            </a>
            <a href="vendas.html">
                <span class="icon">💰</span>
                <span>Vendas</span>
            </a>
            <a href="relatorios.html">
                <span class="icon">📈</span>
                <span>Relatórios</span>
            </a>
            <a href="configuracoes.html">
                <span class="icon">⚙️</span>
                <span>Configurações</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            &copy; 2024 CRM System
        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <div class="page-header">
            <h1>Novo Cliente</h1>
            <a href="listagem.html" class="btn-back">← Voltar à Listagem</a>
        </div>

        <div class="form-card">
            <h2>Cadastrar Cliente</h2>

            <div id="message" class="message"></div>

            <form id="clienteForm">
                <div class="form-group">
                    <label for="nome">Nome Completo *</label>
                    <input type="text" id="nome" name="nome" required placeholder="Digite o nome completo">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="email">E-mail *</label>
                        <input type="email" id="email" name="email" required placeholder="exemplo@email.com">
                    </div>
                    <div class="form-group">
                        <label for="telefone">Telefone *</label>
                        <input type="text" id="telefone" name="telefone" required placeholder="(00) 00000-0000">
                    </div>
                </div>

                <div class="form-group">
                    <label for="cpf">CPF *</label>
                    <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00">
                </div>

                <!-- Endereço dividido em três campos -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="rua">Rua *</label>
                        <input type="text" id="rua" name="rua" required placeholder="Nome da rua">
                    </div>
                    <div class="form-group small">
                        <label for="numero">Número *</label>
                        <input type="text" id="numero" name="numero" required placeholder="Nº">
                    </div>
                </div>

                <div class="form-group">
                    <label for="bairro">Bairro *</label>
                    <input type="text" id="bairro" name="bairro" required placeholder="Nome do bairro">
                </div>

                <div class="form-group">
                    <label for="cidade">Cidade *</label>
                    <input type="text" id="cidade" name="cidade" required placeholder="Nome da cidade">
                </div>

                <div class="form-group">
                    <label for="observacoes">Observações</label>
                    <textarea id="observacoes" name="observacoes" rows="3" placeholder="Informações adicionais (opcional)"></textarea>
                </div>

                <button type="submit" class="btn-submit">Salvar Cliente</button>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('clienteForm');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async function (e) {
            e.preventDefault();

            const data = {
                nome: document.getElementById('nome').value.trim(),
                email: document.getElementById('email').value.trim(),
                telefone: document.getElementById('telefone').value.trim(),
                cpf: document.getElementById('cpf').value.trim(),
                rua: document.getElementById('rua').value.trim(),
                numero: document.getElementById('numero').value.trim(),
                bairro: document.getElementById('bairro').value.trim(),
                cidade: document.getElementById('cidade').value.trim(),
                observacoes: document.getElementById('observacoes').value.trim()
            };

            try {
                const response = await fetch('/api/clientes', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    const result = await response.json();
                    messageDiv.className = 'message success';
                    messageDiv.textContent = 'Cliente cadastrado com sucesso!';
                    form.reset();
                    setTimeout(() => {
                        window.location.href = 'listagem.html';
                    }, 1500);
                } else {
                    const error = await response.json();
                    messageDiv.className = 'message error';
                    messageDiv.textContent = error.message || 'Erro ao cadastrar cliente. Tente novamente.';
                }
            } catch (err) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Erro de conexão. Verifique sua rede e tente novamente.';
            }
        });
    </script>
</body>
</html>

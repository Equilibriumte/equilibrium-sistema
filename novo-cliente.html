<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cliente - Equilibrium</title>
    <script src="js/database.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f4f4f9; display: flex; justify-content: center; padding: 40px 20px; }
        .card { background: white; width: 100%; max-width: 600px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); padding: 30px; position: relative; }
        .header h1 { color: #4B0082; font-size: 24px; margin-bottom: 5px; }
        .header p { color: #888; font-size: 14px; margin-bottom: 30px; }
        .section-title { color: #4B0082; font-size: 18px; font-weight: bold; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; font-weight: 600; color: #4B0082; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        input:focus { border-color: #4B0082; }
        .row-3 { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; }
        .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-save { width: 100%; padding: 12px; background: #4B0082; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-save:hover { background: #36005e; }
        .btn-save:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>Novo Cliente</h1>
            <p>Preencha os dados para cadastrar</p>
        </div>
        
        <div class="section-title">📋 Dados Pessoais</div>
        
        <form id="formCliente" onsubmit="enviarFormulario(event)">
            <div class="form-group">
                <label>Nome completo *</label>
                <input type="text" id="nome" placeholder="Nome completo do cliente" required>
            </div>
            
            <div class="form-group">
                <label>WhatsApp *</label>
                <input type="text" id="whatsapp" placeholder="Digite apenas números (ex: 5511999998888)" required>
            </div>
            
            <div class="row-2">
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" placeholder="cliente@email.com" required>
                </div>
                <div class="form-group">
                    <label>Instagram</label>
                    <input type="text" id="instagram" placeholder="@usuario">
                </div>
            </div>
            
            <label>Endereço</label>
            <div class="row-3">
                <input type="text" id="rua" placeholder="Rua">
                <input type="text" id="numero" placeholder="N°">
                <input type="text" id="bairro" placeholder="Bairro">
            </div>
            
            <div class="row-2" style="margin-top: 10px;">
                <input type="text" id="cidade" placeholder="Cidade">
                <input type="text" id="estado" placeholder="Estado">
            </div>
            
            <div class="form-group" style="margin-top: 10px;">
                <input type="text" id="cep" placeholder="CEP">
            </div>
            
            <div class="form-group">
                <label>Data de nascimento</label>
                <input type="date" id="nascimento">
            </div>
            
            <div class="form-group">
                <label>Indicação</label>
                <input type="text" id="indicacao" placeholder="Quem indicou?">
            </div>
            
            <button type="submit" id="btnSalvar" class="btn-save">Salvar Cliente</button>
        </form>
    </div>

    <script>
        // Máscara de WhatsApp +55 (XX) XXXXX-XXXX
        document.getElementById('whatsapp').addEventListener('input', function (e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,2})(\d{0,5})(\d{0,4})/);
            e.target.value = !x[2] ? x[1] : '+55 (' + x[2] + ') ' + x[3] + (x[4] ? '-' + x[4] : '');
        });

        async function enviarFormulario(event) {
            event.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.disabled = true;
            btn.innerText = "Salvando na nuvem...";

            const dados = {
                nome: document.getElementById('nome').value,
                whatsapp: document.getElementById('whatsapp').value,
                email: document.getElementById('email').value,
                instagram: document.getElementById('instagram').value,
                rua: document.getElementById('rua').value,
                numero: document.getElementById('numero').value,
                bairro: document.getElementById('bairro').value,
                cidade: document.getElementById('cidade').value,
                estado: document.getElementById('estado').value,
                cep: document.getElementById('cep').value,
                nascimento: document.getElementById('nascimento').value,
                indicacao: document.getElementById('indicacao').value,
                dataCadastro: new Date().toISOString()
            };

            try {
                await window.salvarCliente(dados);
                alert("Cliente salvo com sucesso!");
                window.location.href = 'clientes.html';
            } catch (error) {
                alert("Erro ao salvar. Verifique a conexão.");
                btn.disabled = false;
                btn.innerText = "Salvar Cliente";
            }
        }
    </script>
</body>
</html>

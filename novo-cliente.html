<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cliente</title>
    <script src="js/database.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(135deg, #4a0e4e 0%, #6d1b75 50%, #9c27b0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.35);
            width: 100%;
            max-width: 600px;
            padding: 35px;
            border-top: 6px solid #d4af37;
        }
        h1 {
            color: #6d1b75;
            text-align: center;
            margin-bottom: 25px;
            font-size: 1.9rem;
        }
        h1 span { color: #d4af37; }
        .form-group { margin-bottom: 16px; }
        label {
            display: block;
            margin-bottom: 6px;
            color: #4a0e4e;
            font-weight: 600;
            font-size: 0.95rem;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #d4af37;
            border-radius: 8px;
            outline: none;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus {
            border-color: #6d1b75;
            box-shadow: 0 0 0 3px rgba(109, 27, 117, 0.15);
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (max-width: 480px) { .grid-2 { grid-template-columns: 1fr; } }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(90deg, #d4af37, #b8962e);
            color: #4a0e4e;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, filter 0.15s;
            margin-top: 10px;
        }
        .btn:hover { transform: translateY(-2px); filter: brightness(1.08); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .feedback {
            text-align: center;
            margin-top: 18px;
            font-weight: 600;
            color: #6d1b75;
            min-height: 24px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Novo <span>Cliente</span></h1>
        <form id="formCliente" onsubmit="enviarFormulario(event)">
            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" required>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label for="whatsapp">WhatsApp</label>
                    <input type="tel" id="whatsapp" name="whatsapp" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email">
                </div>
            </div>
            <div class="form-group">
                <label for="instagram">Instagram</label>
                <input type="text" id="instagram" name="instagram">
            </div>
            <div class="form-group">
                <label for="rua">Rua</label>
                <input type="text" id="rua" name="rua">
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label for="numero">Número</label>
                    <input type="text" id="numero" name="numero">
                </div>
                <div class="form-group">
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro" name="bairro">
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" name="cidade">
                </div>
                <div class="form-group">
                    <label for="estado">Estado</label>
                    <input type="text" id="estado" name="estado" maxlength="2">
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" name="cep">
                </div>
                <div class="form-group">
                    <label for="nascimento">Nascimento</label>
                    <input type="date" id="nascimento" name="nascimento">
                </div>
            </div>
            <div class="form-group">
                <label for="indicacao">Indicação</label>
                <input type="text" id="indicacao" name="indicacao">
            </div>
            <button type="submit" class="btn" id="btnSalvar">Salvar Cliente</button>
            <div class="feedback" id="feedback"></div>
        </form>
    </div>

    <script>
        async function enviarFormulario(event) {
            event.preventDefault();

            const feedback = document.getElementById('feedback');
            const btnSalvar = document.getElementById('btnSalvar');

            feedback.textContent = 'Salvando na nuvem...';
            btnSalvar.disabled = true;

            const novoCliente = {
                nome: document.getElementById('nome').value.trim(),
                whatsapp: document.getElementById('whatsapp').value.trim(),
                email: document.getElementById('email').value.trim(),
                instagram: document.getElementById('instagram').value.trim(),
                rua: document.getElementById('rua').value.trim(),
                numero: document.getElementById('numero').value.trim(),
                bairro: document.getElementById('bairro').value.trim(),
                cidade: document.getElementById('cidade').value.trim(),
                estado: document.getElementById('estado').value.trim(),
                cep: document.getElementById('cep').value.trim(),
                nascimento: document.getElementById('nascimento').value,
                indicacao: document.getElementById('indicacao').value.trim()
            };

            try {
                await salvarCliente(novoCliente);
                feedback.textContent = 'Cliente salvo com sucesso!';
                setTimeout(() => {
                    window.location.href = 'clientes.html';
                }, 800);
            } catch (erro) {
                feedback.textContent = 'Erro ao salvar: ' + erro.message;
                btnSalvar.disabled = false;
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Equilibrium Terapias Energéticas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2D1B4E 0%, #4A2B7A 100%);
            font-family: 'Inter', sans-serif;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background-color: #FFFFFF;
            border-radius: 12px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .brand {
            margin-bottom: 32px;
        }

        .brand-logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #D4AF37;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .brand-subtitle {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 400;
            color: #6B5B7D;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: #2D1B4E;
            margin-bottom: 8px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #D1C4E9;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: #2D1B4E;
            background-color: #FAFAFA;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #D4AF37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.15);
            background-color: #FFFFFF;
        }

        .form-group input::placeholder {
            color: #9E9E9E;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            margin-top: 8px;
            border: none;
            border-radius: 8px;
            background-color: #D4AF37;
            color: #2D1B4E;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .btn-login:hover {
            background-color: #C4A030;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .forgot-password {
            display: block;
            margin-top: 20px;
            font-size: 0.875rem;
            font-weight: 500;
            color: #4A2B7A;
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .forgot-password:hover {
            color: #D4AF37;
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }

            .brand-logo {
                font-size: 2rem;
            }

            .brand-subtitle {
                font-size: 0.875rem;
            }
        }
    </style>
</head>
<body>
    <main class="login-card">
        <div class="brand">
            <h1 class="brand-logo">Equilibrium</h1>
            <p class="brand-subtitle">Terapias Energéticas</p>
        </div>

        <form action="visao-geral.html" method="GET">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="seu@email.com" required>
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Sua senha" required>
            </div>

            <button type="submit" class="btn-login">Entrar</button>
        </form>

        <a href="#" class="forgot-password">Esqueceu a senha?</a>
    </main>
</body>
</html>

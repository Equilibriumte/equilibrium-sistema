<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha do Cliente | Equilibrium</title>
    <script src="js/database.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --roxo-principal: #5e2e7e;
            --roxo-escuro: #3f1b57;
            --roxo-claro: #8c5da8;
            --dourado-principal: #c9a227;
            --dourado-escuro: #9e7d1c;
            --dourado-claro: #e8d698;
            --fundo: #faf8f5;
            --branco: #ffffff;
            --texto: #3a2e3f;
            --texto-suave: #6d5a73;
            --borda: #e0d6e8;
            --sombra: rgba(94, 46, 126, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Lato', sans-serif;
            background-color: var(--fundo);
            color: var(--texto);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Cabeçalho */
        header {
            background: linear-gradient(135deg, var(--roxo-principal) 0%, var(--roxo-escuro) 100%);
            color: var(--branco);
            padding: 40px 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(201,162,39,0.15) 0%, transparent 60%);
            pointer-events: none;
        }

        .header-content {
            position: relative;
            z-index: 1;
            max-width: 900px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            font-weight: 700;
            color: var(--dourado-claro);
            letter-spacing: 2px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
            margin-bottom: 8px;
        }

        .tagline {
            color: var(--dourado-claro);
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .header-line {
            width: 80px;
            height: 3px;
            background: var(--dourado-principal);
            margin: 15px auto 0;
            border-radius: 2px;
        }

        /* Container principal */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Card padrão */
        .card {
            background: var(--branco);
            border-radius: 16px;
            box-shadow: 0 8px 30px var(--sombra);
            padding: 32px;
            margin-bottom: 32px;
            border: 1px solid var(--borda);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 40px rgba(94, 46, 126, 0.15);
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            color: var(--roxo-principal);
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--dourado-claro);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-title .icon {
            color: var(--dourado-principal);
            font-size: 1.5rem;
        }

        /* Grid de dados do cliente */
        .dados-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .campo {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .campo-label {
            font-size: 0.85rem;
            color: var(--texto-suave);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .campo-valor {
            font-size: 1.05rem;
            color: var(--texto);
            font-weight: 400;
            padding: 12px 16px;
            background: var(--fundo);
            border-radius: 10px;
            border: 1px solid var(--borda);
            min-height: 44px;
            display: flex;
            align-items: center;
        }

        .campo-valor.vazio {
            color: var(--texto-suave);
            font-style: italic;
        }

        /* Histórico de atendimentos */
        .lista-atendimentos {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .atendimento-item {
            background: var(--fundo);
            border-radius: 12px;
            padding: 24px;
            border-left: 4px solid var(--dourado-principal);
            transition: all 0.3s ease;
        }

        .atendimento-item:hover {
            background: #f5f0f8;
            border-left-width: 6px;
        }

        .atendimento-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .atendimento-data {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--roxo-principal);
        }

        .atendimento-tipo {
            background: linear-gradient(135deg, var(--dourado-principal), var(--dourado-escuro));
            color: var(--branco);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .atendimento-secao {
            margin-bottom: 14px;
        }

        .atendimento-secao:last-child {
            margin-bottom: 0;
        }

        .atendimento-secao-label {
            font-size: 0.8rem;
            color: var(--texto-suave);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .atendimento-queixas {
            color: var(--texto);
            line-height: 1.6;
        }

        .chakras-resumo {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .chakra-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--branco);
            color: var(--roxo-principal);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            border: 1px solid var(--borda);
            font-weight: 700;
        }

        .chakra-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .sem-atendimentos {
            text-align: center;
            padding: 40px 20px;
            color: var(--texto-suave);
        }

        .sem-atendimentos-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        /* Mensagens de erro e loading */
        .mensagem {
            text-align: center;
            padding: 40px 20px;
            border-radius: 16px;
            background: var(--branco);
            box-shadow: 0 8px 30px var(--sombra);
            border: 1px solid var(--borda);
        }

        .mensagem-erro {
            color: #b91c1c;
        }

        .mensagem-erro h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: #991b1b;
        }

        .btn-voltar {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 28px;
            background: linear-gradient(135deg, var(--roxo-principal), var(--roxo-escuro));
            color: var(--branco);
            text-decoration: none;
            border-radius: 30px;
            font-weight: 700;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .btn-voltar:hover {
            background: var(--branco);
            color: var(--roxo-principal);
            border-color: var(--roxo-principal);
            transform: translateY(-2px);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--texto-suave);
            font-size: 0.9rem;
            border-top: 1px solid var(--borda);
        }

        footer .marca {
            color: var(--roxo-principal);
            font-weight: 700;
        }

        /* Responsivo */
        @media (max-width: 600px) {
            .logo {
                font-size: 2.2rem;
            }

            .tagline {
                font-size: 0.9rem;
            }

            .card {
                padding: 24px;
            }

            .card-title {
                font-size: 1.5rem;
            }

            .atendimento-header {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <h1 class="logo">Equilibrium</h1>
            <p class="tagline">Espaço Terapêutico</p>
            <div class="header-line"></div>
        </div>
    </header>

    <main class="container" id="conteudo">
        <div class="mensagem">
            <p>Carregando ficha do cliente...</p>
        </div>
    </main>

    <footer>
        <p>&copy; <span class="marca">Equilibrium</span> - Espaço Terapêutico. Todos os direitos reservados.</p>
    </footer>

    <script>
        // Mapeamento de cores aproximadas para os chakras (pode ser ajustado conforme database.js)
        const coresChakras = {
            'Muladhara': '#c0392b',
            'Swadhisthana': '#e67e22',
            'Manipura': '#f1c40f',
            'Anahata': '#27ae60',
            'Vishuddha': '#2980b9',
            'Ajna': '#8e44ad',
            'Sahasrara': '#9b59b6',
            'Coronária': '#9b59b6',
            'Laríngeo': '#2980b9',
            'Cardíaco': '#27ae60',
            'Umbilical': '#f1c40f',
            'Sacral': '#e67e22',
            'Raiz': '#c0392b'
        };

        function obterCorChakra(nomeChakra) {
            if (!nomeChakra) return '#5e2e7e';
            const nome = nomeChakra.trim();
            // Tenta encontrar pelo nome completo ou parcial
            for (const [chave, cor] of Object.entries(coresChakras)) {
                if (nome.toLowerCase().includes(chave.toLowerCase())) {
                    return cor;
                }
            }
            return '#5e2e7e';
        }

        function formatarData(dataValor) {
            if (!dataValor) return 'Data não informada';
            try {
                const data = new Date(dataValor);
                if (isNaN(data.getTime())) return dataValor;
                return data.toLocaleDateString('pt-BR', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                });
            } catch (e) {
                return dataValor;
            }
        }

        function formatarValor(campo) {
            if (campo === null || campo === undefined || campo === '') {
                return '<span class="campo-valor vazio">Não informado</span>';
            }
            return campo;
        }

        function criarCampo(label, valor) {
            return `
                <div class="campo">
                    <span class="campo-label">${label}</span>
                    <div class="campo-valor">${formatarValor(valor)}</div>
                </div>
            `;
        }

        function criarTagChakra(nomeChakra) {
            const cor = obterCorChakra(nomeChakra);
            return `
                <span class="chakra-tag">
                    <span class="chakra-dot" style="background-color: ${cor};"></span>
                    ${nomeChakra}
                </span>
            `;
        }

        function resumirChakras(chakras) {
            if (!chakras || !Array.isArray(chakras) || chakras.length === 0) {
                return '<p class="campo-valor vazio">Nenhum chakra registrado</p>';
            }
            const tags = chakras.map(chakra => {
                let nome = '';
                if (typeof chakra === 'string') {
                    nome = chakra;
                } else if (chakra && typeof chakra === 'object') {
                    nome = chakra.nome || chakra.name || chakra.chakra || JSON.stringify(chakra);
                }
                return nome ? criarTagChakra(nome) : '';
            }).filter(Boolean);

            if (tags.length === 0) {
                return '<p class="campo-valor vazio">Nenhum chakra registrado</p>';
            }
            return `<div class="chakras-resumo">${tags.join('')}</div>`;
        }

        function renderizarCliente(cliente) {
            if (!cliente) {
                throw new Error('Cliente não encontrado');
            }

            return `
                <section class="card">
                    <h2 class="card-title">
                        <span class="icon">&#9733;</span>
                        Dados do Cliente
                    </h2>
                    <div class="dados-grid">
                        ${criarCampo('Nome', cliente.nome || cliente.name)}
                        ${criarCampo('WhatsApp', cliente.whatsapp || cliente.telefone || cliente.celular)}
                        ${criarCampo('Email', cliente.email || cliente.e_mail)}
                        ${criarCampo('Instagram', cliente.instagram || cliente.insta)}
                        ${criarCampo('Endereço', cliente.endereco || cliente.endereço || cliente.address)}
                        ${criarCampo('Nascimento', formatarData(cliente.nascimento || cliente.dataNascimento || cliente.birthDate))}
                        ${criarCampo('Indicação', cliente.indicacao || cliente.indicação || cliente.indicadoPor || cliente.referral)}
                    </div>
                </section>
            `;
        }

        function renderizarAtendimentos(atendimentos) {
            if (!atendimentos || !Array.isArray(atendimentos) || atendimentos.length === 0) {
                return `
                    <section class="card">
                        <h2 class="card-title">
                            <span class="icon">&#9733;</span>
                            Histórico de Atendimentos
                        </h2>
                        <div class="sem-atendimentos">
                            <div class="sem-atendimentos-icon">&#9783;</div>
                            <p>Nenhum atendimento registrado para este cliente.</p>
                        </div>
                    </section>
                `;
            }

            // Ordena cronologicamente (mais recente primeiro)
            const ordenados = [...atendimentos].sort((a, b) => {
                const dataA = new Date(a.data || a.date || a.dataAtendimento || 0);
                const dataB = new Date(b.data || b.date || b.dataAtendimento || 0);
                if (isNaN(dataA.getTime()) && isNaN(dataB.getTime())) return 0;
                if (isNaN(dataA.getTime())) return 1;
                if (isNaN(dataB.getTime())) return -1;
                return dataB.getTime() - dataA.getTime();
            });

            const itens = ordenados.map(atendimento => {
                const data = atendimento.data || atendimento.date || atendimento.dataAtendimento;
                const tipo = atendimento.tipo || atendimento.type || atendimento.tipoAtendimento || 'Atendimento';
                const queixas = atendimento.queixas || atendimento.queixa || atendimento.motivo || atendimento.observacoes || 'Não registrado';
                const chakras = atendimento.chakras || atendimento.chakra || atendimento.chakrasTratados || [];

                return `
                    <article class="atendimento-item">
                        <div class="atendimento-header">
                            <span class="atendimento-data">${formatarData(data)}</span>
                            <span class="atendimento-tipo">${tipo}</span>
                        </div>
                        <div class="atendimento-secao">
                            <div class="atendimento-secao-label">Queixas</div>
                            <p class="atendimento-queixas">${queixas}</p>
                        </div>
                        <div class="atendimento-secao">
                            <div class="atendimento-secao-label">Chakras Tratados</div>
                            ${resumirChakras(chakras)}
                        </div>
                    </article>
                `;
            }).join('');

            return `
                <section class="card">
                    <h2 class="card-title">
                        <span class="icon">&#9733;</span>
                        Histórico de Atendimentos
                    </h2>
                    <div class="lista-atendimentos">
                        ${itens}
                    </div>
                </section>
            `;
        }

        function mostrarErro(mensagem) {
            const conteudo = document.getElementById('conteudo');
            conteudo.innerHTML = `
                <div class="mensagem mensagem-erro">
                    <h2>Ops! Algo deu errado</h2>
                    <p>${mensagem}</p>
                    <a href="index.html" class="btn-voltar">Voltar para a lista</a>
                </div>
            `;
        }

        function carregarFicha() {
            try {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');

                if (!id) {
                    mostrarErro('ID do cliente não foi informado na URL. Use <strong>?id=...</strong> para acessar a ficha.');
                    return;
                }

                // Verifica se as funções do database.js estão disponíveis
                if (typeof getClienteById !== 'function' || typeof getAtendimentosByClienteId !== 'function') {
                    mostrarErro('Não foi possível carregar a base de dados. Verifique se o arquivo <strong>js/database.js</strong> está carregado e exporta as funções <code>getClienteById</code> e <code>getAtendimentosByClienteId</code>.');
                    return;
                }

                const cliente = getClienteById(id);
                const atendimentos = getAtendimentosByClienteId(id);

                const conteudo = document.getElementById('conteudo');
                conteudo.innerHTML = renderizarCliente(cliente) + renderizarAtendimentos(atendimentos);
            } catch (erro) {
                console.error('Erro ao carregar ficha:', erro);
                mostrarErro(erro.message || 'Erro desconhecido ao carregar a ficha do cliente.');
            }
        }

        // Inicializa a ficha quando o DOM estiver pronto
        document.addEventListener('DOMContentLoaded', carregarFicha);
    </script>
</body>
</html>

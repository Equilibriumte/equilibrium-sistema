<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha do Cliente - Equilibrium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #4a148c 0%, #7b1fa2 100%);
            color: #fff;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 5px solid #d4af37;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        header p {
            color: #d4af37;
            font-weight: 600;
            font-size: 1.1rem;
        }

        main {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
        }

        section {
            background-color: #fff;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border-top: 4px solid #d4af37;
        }

        section h2 {
            color: #4a148c;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #d4af37;
            font-size: 1.4rem;
        }

        .dados-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .campo {
            display: flex;
            flex-direction: column;
        }

        .campo label {
            font-weight: 700;
            color: #7b1fa2;
            font-size: 0.85rem;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .campo span {
            font-size: 1rem;
            color: #444;
            word-break: break-word;
        }

        .lista-atendimentos {
            list-style: none;
        }

        .atendimento-item {
            background-color: #fafafa;
            border-left: 4px solid #d4af37;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .atendimento-item:last-child {
            margin-bottom: 0;
        }

        .atendimento-campo {
            margin-bottom: 8px;
        }

        .atendimento-campo:last-child {
            margin-bottom: 0;
        }

        .atendimento-campo label {
            font-weight: 700;
            color: #4a148c;
            font-size: 0.85rem;
            text-transform: uppercase;
            display: block;
            margin-bottom: 2px;
        }

        .atendimento-campo span {
            color: #444;
        }

        .mensagem {
            text-align: center;
            padding: 20px;
            border-radius: 6px;
            font-weight: 600;
        }

        .mensagem.erro {
            background-color: #ffebee;
            color: #c62828;
        }

        .mensagem.info {
            background-color: #e8eaf6;
            color: #283593;
        }

        .vazio {
            text-align: center;
            color: #777;
            font-style: italic;
            padding: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Equilibrium</h1>
        <p>Ficha do Cliente</p>
    </header>

    <main>
        <section id="secao-dados">
            <h2>Dados do Cliente</h2>
            <div id="dados-cliente" class="dados-grid">
                <p class="mensagem info">Carregando dados do cliente...</p>
            </div>
        </section>

        <section id="secao-atendimentos">
            <h2>Histórico de Atendimentos</h2>
            <ul id="lista-atendimentos" class="lista-atendimentos">
                <li class="vazio">Carregando atendimentos...</li>
            </ul>
        </section>
    </main>

    <script src="js/database.js"></script>
    <script>
        function obterParametroUrl(nome) {
            const params = new URLSearchParams(window.location.search);
            return params.get(nome);
        }

        function formatarData(dataString) {
            if (!dataString) return '-';
            const data = new Date(dataString);
            if (isNaN(data.getTime())) return dataString;
            return data.toLocaleDateString('pt-BR');
        }

        function carregarFicha() {
            const id = obterParametroUrl('id');
            const containerDados = document.getElementById('dados-cliente');
            const containerAtendimentos = document.getElementById('lista-atendimentos');

            if (!id) {
                containerDados.innerHTML = '<p class="mensagem erro">ID do cliente não informado na URL.</p>';
                containerAtendimentos.innerHTML = '<li class="vazio">Nenhum atendimento para exibir.</li>';
                return;
            }

            if (typeof window.getClienteById !== 'function') {
                containerDados.innerHTML = '<p class="mensagem erro">Função getClienteById não encontrada. Verifique se database.js está carregado.</p>';
                return;
            }

            const cliente = window.getClienteById(id);

            if (!cliente) {
                containerDados.innerHTML = '<p class="mensagem erro">Cliente não encontrado.</p>';
                containerAtendimentos.innerHTML = '<li class="vazio">Nenhum atendimento para exibir.</li>';
                return;
            }

            const campos = [
                { label: 'Nome', valor: cliente.nome },
                { label: 'WhatsApp', valor: cliente.whatsapp },
                { label: 'Email', valor: cliente.email },
                { label: 'Instagram', valor: cliente.instagram },
                { label: 'Rua', valor: cliente.rua },
                { label: 'Número', valor: cliente.numero },
                { label: 'Bairro', valor: cliente.bairro },
                { label: 'Cidade', valor: cliente.cidade },
                { label: 'Estado', valor: cliente.estado },
                { label: 'CEP', valor: cliente.cep },
                { label: 'Nascimento', valor: formatarData(cliente.nascimento) },
                { label: 'Indicação', valor: cliente.indicacao }
            ];

            containerDados.innerHTML = campos.map(campo => `
                <div class="campo">
                    <label>${campo.label}</label>
                    <span>${campo.valor || '-'}</span>
                </div>
            `).join('');

            if (typeof window.getAtendimentosByClienteId !== 'function') {
                containerAtendimentos.innerHTML = '<li class="vazio">Função getAtendimentosByClienteId não encontrada.</li>';
                return;
            }

            const atendimentos = window.getAtendimentosByClienteId(id);

            if (!atendimentos || atendimentos.length === 0) {
                containerAtendimentos.innerHTML = '<li class="vazio">Nenhum atendimento encontrado para este cliente.</li>';
                return;
            }

            containerAtendimentos.innerHTML = atendimentos.map(atendimento => `
                <li class="atendimento-item">
                    <div class="atendimento-campo">
                        <label>Data</label>
                        <span>${formatarData(atendimento.data)}</span>
                    </div>
                    <div class="atendimento-campo">
                        <label>Tipo</label>
                        <span>${atendimento.tipo || '-'}</span>
                    </div>
                    <div class="atendimento-campo">
                        <label>Observações</label>
                        <span>${atendimento.observacoes || '-'}</span>
                    </div>
                </li>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', carregarFicha);
    </script>
</body>
</html>

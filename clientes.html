<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #2e1065 0%, #4c1d95 50%, #2e1065 100%);
      color: #f3f4f6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      background-color: rgba(255, 255, 255, 0.08);
      border: 1px solid #d4af37;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      padding: 30px;
    }

    h1 {
      color: #d4af37;
      text-align: center;
      margin-bottom: 24px;
      font-weight: 600;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
    }

    .loading {
      text-align: center;
      color: #d4af37;
      font-size: 1.1rem;
      padding: 20px;
      display: none;
    }

    .loading.visible {
      display: block;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      overflow: hidden;
    }

    thead {
      background-color: #d4af37;
      color: #2e1065;
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(212, 175, 55, 0.3);
    }

    th {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    tbody tr {
      background-color: rgba(255, 255, 255, 0.05);
      transition: background-color 0.2s ease;
    }

    tbody tr:hover {
      background-color: rgba(212, 175, 55, 0.15);
    }

    tbody tr:nth-child(even) {
      background-color: rgba(255, 255, 255, 0.03);
    }

    .empty {
      text-align: center;
      color: #d4af37;
      padding: 30px;
      font-style: italic;
    }

    .error {
      text-align: center;
      color: #fca5a5;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Lista de Clientes</h1>
    <div id="loading" class="loading visible">Carregando...</div>
    <div id="content" style="display: none;">
      <table id="tabelaClientes">
        <thead>
          <tr>
            <th>Nome</th>
            <th>E-mail</th>
            <th>Telefone</th>
            <th>Cidade</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
        </tbody>
      </table>
      <div id="mensagemVazia" class="empty" style="display: none;">
        Nenhum cliente encontrado.
      </div>
    </div>
  </div>

  <script src="js/database.js"></script>
  <script>
    async function carregarClientes() {
      const loadingEl = document.getElementById('loading');
      const contentEl = document.getElementById('content');
      const tbodyEl = document.querySelector('#tabelaClientes tbody');
      const mensagemVaziaEl = document.getElementById('mensagemVazia');

      loadingEl.classList.add('visible');
      contentEl.style.display = 'none';
      tbodyEl.innerHTML = '';

      try {
        const clientes = await buscarClientes();

        if (!clientes || clientes.length === 0) {
          mensagemVaziaEl.style.display = 'block';
          document.querySelector('#tabelaClientes').style.display = 'none';
        } else {
          mensagemVaziaEl.style.display = 'none';
          document.querySelector('#tabelaClientes').style.display = 'table';

          clientes.forEach(cliente => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
              <td>${cliente.nome || ''}</td>
              <td>${cliente.email || ''}</td>
              <td>${cliente.telefone || ''}</td>
              <td>${cliente.cidade || ''}</td>
              <td>${cliente.estado || ''}</td>
            `;
            tbodyEl.appendChild(tr);
          });
        }

        contentEl.style.display = 'block';
      } catch (erro) {
        contentEl.innerHTML = `<div class="error">Erro ao carregar os clientes: ${erro.message}</div>`;
        contentEl.style.display = 'block';
      } finally {
        loadingEl.classList.remove('visible');
      }
    }

    document.addEventListener('DOMContentLoaded', carregarClientes);
  </script>
</body>
</html>

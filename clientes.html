<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - Equilibrium</title>
  <style>
    :root {
      --purple: #4B0082;
      --purple-dark: #36005e;
      --purple-light: #7a3db8;
      --gold: #D4AF37;
      --gold-light: #f3d768;
      --white: #ffffff;
      --gray-bg: #f7f5fa;
      --gray-text: #4a4a4a;
      --shadow: 0 2px 8px rgba(75, 0, 130, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--gray-bg);
      color: var(--gray-text);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 24px;
    }

    h1 {
      color: var(--purple);
      font-size: 1.8rem;
      font-weight: 700;
    }

    .btn-new {
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      color: var(--purple-dark);
      padding: 12px 22px;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      box-shadow: var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-new:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(75, 0, 130, 0.2);
    }

    .search-bar {
      margin-bottom: 24px;
    }

    .search-bar input {
      width: 100%;
      max-width: 400px;
      padding: 12px 16px;
      border: 2px solid var(--purple-light);
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-bar input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.25);
    }

    .table-wrapper {
      background: var(--white);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: var(--purple);
      color: var(--gold);
    }

    th, td {
      padding: 16px;
      text-align: left;
    }

    th {
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 0.5px;
    }

    tbody tr {
      border-bottom: 1px solid #e9e2f0;
      transition: background 0.15s;
    }

    tbody tr:hover {
      background: #faf7ff;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    .empty-state {
      padding: 40px 16px;
      text-align: center;
      color: var(--purple-light);
      font-weight: 500;
    }

    .loading {
      padding: 40px 16px;
      text-align: center;
      color: var(--purple);
      font-weight: 500;
    }

    @media (max-width: 640px) {
      th, td {
        padding: 12px;
        font-size: 0.9rem;
      }
      header {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Clientes</h1>
      <a href="novo-cliente.html" class="btn-new">+ Novo Cliente</a>
    </header>

    <div class="search-bar">
      <input type="text" id="inputBusca" placeholder="Buscar por nome...">
    </div>

    <div class="table-wrapper">
      <div id="loading" class="loading">Carregando clientes...</div>
      <table id="tabelaClientes" style="display: none;">
        <thead>
          <tr>
            <th>Nome</th>
            <th>WhatsApp</th>
            <th>Email</th>
            <th>Cidade/Estado</th>
          </tr>
        </thead>
        <tbody id="corpoTabela">
        </tbody>
      </table>
      <div id="mensagemVazia" class="empty-state" style="display: none;">
        Nenhum cliente encontrado.
      </div>
    </div>
  </div>

  <script type="module">
    import { buscarClientes } from './js/database.js';

    const loading = document.getElementById('loading');
    const tabela = document.getElementById('tabelaClientes');
    const corpoTabela = document.getElementById('corpoTabela');
    const mensagemVazia = document.getElementById('mensagemVazia');
    const inputBusca = document.getElementById('inputBusca');

    let todosClientes = [];

    function formatarCidadeEstado(cliente) {
      const cidade = cliente.cidade || '';
      const estado = cliente.estado || '';
      if (!cidade && !estado) return '—';
      if (cidade && estado) return `${cidade} / ${estado}`;
      return cidade || estado;
    }

    function renderizar(clientes) {
      corpoTabela.innerHTML = '';

      if (!Array.isArray(clientes)) {
        mensagemVazia.textContent = 'Erro ao carregar dados dos clientes.';
        mensagemVazia.style.display = 'block';
        tabela.style.display = 'none';
        return;
      }

      if (clientes.length === 0) {
        mensagemVazia.textContent = 'Nenhum cliente encontrado.';
        mensagemVazia.style.display = 'block';
        tabela.style.display = 'none';
        return;
      }

      mensagemVazia.style.display = 'none';
      tabela.style.display = 'table';

      clientes.forEach((cliente) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${cliente.nome || '—'}</td>
          <td>${cliente.whatsapp || '—'}</td>
          <td>${cliente.email || '—'}</td>
          <td>${formatarCidadeEstado(cliente)}</td>
        `;
        corpoTabela.appendChild(tr);
      });
    }

    function filtrarClientes(termo) {
      const termoLimpo = termo.toLowerCase().trim();
      if (!termoLimpo) return todosClientes;
      return todosClientes.filter((cliente) =>
        (cliente.nome || '').toLowerCase().includes(termoLimpo)
      );
    }

    inputBusca.addEventListener('input', (evento) => {
      renderizar(filtrarClientes(evento.target.value));
    });

    try {
      todosClientes = await buscarClientes();
      renderizar(todosClientes);
    } catch (erro) {
      console.error('Erro ao buscar clientes:', erro);
      renderizar(null);
    } finally {
      loading.style.display = 'none';
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Clientes - Equilibrium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; background-color: #f4f0fa; min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 250px; background: linear-gradient(180deg, #4b0082 0%, #6a0dad 100%); color: #ffd700; padding: 20px; position: fixed; height: 100vh; z-index: 100; }
        .sidebar h2 { margin-bottom: 30px; text-align: center; border-bottom: 1px solid rgba(255,215,0,0.3); padding-bottom: 10px; font-size: 22px; }
        .sidebar a { display: block; color: white; text-decoration: none; padding: 12px; margin-bottom: 10px; border-radius: 8px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background: rgba(255,215,0,0.2); color: #ffd700; font-weight: bold; }

        /* Content */
        .content { margin-left: 250px; flex: 1; padding: 40px; width: calc(100% - 250px); }
        .header { margin-bottom: 30px; }
        .header h1 { color: #4b0082; font-size: 28px; }
        
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1500px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; white-space: nowrap; }
        th { background-color: #f8f5ff; color: #4b0082; font-weight: 600; text-transform: uppercase; font-size: 11px; position: sticky; top: 0; }
        .id-cell { font-family: monospace; color: #888; font-weight: bold; }
        .loading { text-align: center; padding: 40px; color: #6a0dad; font-style: italic; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>Equilibrium</h2>
        <nav>
            <a href="index.html">🏠 Home</a>
            <a href="novo-cliente.html">➕ Novo Cliente</a>
            <a href="clientes.html" class="active">📋 Lista de Clientes</a>
        </nav>
    </div>

    <div class="content">
        <div class="header">
            <h1>Lista Completa de Clientes</h1>
        </div>
        
        <div class="card">
            <div id="status-container">
                <div class="loading">🔍 Sincronizando dados com a planilha...</div>
            </div>
            <table id="tabela-clientes" style="display:none;">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Nascimento</th>
                        <th>WhatsApp</th>
                        <th>Email</th>
                        <th>Instagram</th>
                        <th>Endereço</th>
                        <th>Cidade/UF</th>
                        <th>CEP</th>
                        <th>Indicação</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela"></tbody>
            </table>
        </div>
    </div>

    <script>
        // Função para encontrar o valor na planilha ignorando maiúsculas/minúsculas
        function getVal(obj, campo) {
            const keys = Object.keys(obj);
            const keyEncontrada = keys.find(k => k.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "") === campo.toLowerCase());
            return keyEncontrada ? obj[keyEncontrada] : "-";
        }

        // Função para deixar a data bonita (DD-MM-YYYY) e remover o "T03:00:00"
        function formatarData(valor) {
            if (!valor || valor === "-") return "-";
            let d = String(valor);
            if (d.includes("T")) {
                let date = new Date(d);
                let dia = String(date.getUTCDate()).padStart(2, '0');
                let mes = String(date.getUTCMonth() + 1).padStart(2, '0');
                let ano = date.getUTCFullYear();
                return `${dia}-${mes}-${ano}`;
            }
            return d;
        }

        // Função para formatar o WhatsApp com máscara (00) 00000-0000
        function formatarWhats(valor) {
            if (!valor || valor === "-") return "-";
            let tel = String(valor).replace(/\D/g, "");
            if (tel.startsWith("55")) tel = tel.substring(2);
            if (tel.length === 11) {
                return "(" + tel.substring(0, 2) + ") " + tel.substring(2, 7) + "-" + tel.substring(7);
            }
            return valor;
        }

        async function carregarDados() {
            const URL = 'https://script.google.com/macros/s/AKfycby6ijLv0hGmlY561Mn5_4R5XCRTbUsw7JMg5BiqFA3CdMLSfyheFkw2aO4rjHNvFxodAA/exec';
            
            try {
                const response = await fetch(URL);
                const dados = await response.json();
                
                const corpo = document.getElementById('corpo-tabela');
                document.getElementById('status-container').style.display = 'none';
                document.getElementById('tabela-clientes').style.display = 'table';
                corpo.innerHTML = "";

                dados.forEach(c => {
                    const row = `<tr>
                        <td class="id-cell">${getVal(c, 'id')}</td>
                        <td><strong>${getVal(c, 'nome')}</strong></td>
                        <td>${formatarData(getVal(c, 'nascimento'))}</td>
                        <td>${formatarWhats(getVal(c, 'whatsapp'))}</td>
                        <td>${getVal(c, 'email')}</td>
                        <td>${getVal(c, 'instagram')}</td>
                        <td>${getVal(c, 'rua')}, ${getVal(c, 'numero')} - ${getVal(c, 'bairro')}</td>
                        <td>${getVal(c, 'cidade')}/${getVal(c, 'estado')}</td>
                        <td>${getVal(c, 'cep')}</td>
                        <td>${getVal(c, 'indicacao')}</td>
                    </tr>`;
                    corpo.innerHTML += row;
                });

            } catch (error) {
                console.error('Erro:', error);
                document.getElementById('status-container').innerHTML = 
                    '<div style="color:red; text-align:center; padding:20px;">❌ Erro ao carregar dados. Verifique a conexão.</div>';
            }
        }

        window.onload = carregarDados;
    </script>
</body>
</html>

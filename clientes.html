<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - Radiestesia Equilibrium</title>
    <script src="js/database.js"></script>
    <style>
        :root {
            --roxo: #6b2c91;
            --roxo-escuro: #4a1c66;
            --dourado: #d4af37;
            --dourado-claro: #f0d878;
            --branco: #ffffff;
            --fundo: #f8f6f9;
            --texto: #333333;
            --borda: #e0d5e6;
            --sombra: rgba(107, 44, 145, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--fundo);
            color: var(--texto);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, var(--roxo) 0%, var(--roxo-escuro) 100%);
            padding: 25px 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px var(--sombra);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 4px solid var(--dourado);
        }

        header h1 {
            color: var(--branco);
            font-size: 1.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1::before {
            content: "✦";
            color: var(--dourado);
            font-size: 1.4rem;
        }

        .btn-novo {
            background: linear-gradient(135deg, var(--dourado) 0%, var(--dourado-claro) 100%);
            color: var(--roxo-escuro);
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.3);
        }

        .btn-novo:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(212, 175, 55, 0.4);
        }

        .filtro-container {
            background: var(--branco);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 2px 12px var(--sombra);
            margin-bottom: 25px;
            border: 1px solid var(--borda);
        }

        .filtro-container label {
            display: block;
            color: var(--roxo);
            font-weight: 600;
            margin-bottom: 8px;
        }

        #busca {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--borda);
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        #busca:focus {
            outline: none;
            border-color: var(--dourado);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2);
        }

        .tabela-container {
            background: var(--branco);
            border-radius: 12px;
            box-shadow: 0 2px 12px var(--sombra);
            overflow: hidden;
            border: 1px solid var(--borda);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, var(--roxo) 0%, var(--roxo-escuro) 100%);
            color: var(--branco);
        }

        th {
            padding: 16px;
            text-align: left;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px;
            border-bottom: 1px solid var(--borda);
        }

        tbody tr:hover {
            background-color: rgba(107, 44, 145, 0.04);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .btn-ficha {
            background: transparent;
            color: var(--roxo);
            border: 2px solid var(--roxo);
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-ficha:hover {
            background: var(--roxo);
            color: var(--branco);
        }

        .mensagem-vazia {
            text-align: center;
            padding: 50px 20px;
            color: var(--roxo-escuro);
        }

        .mensagem-vazia p {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .mensagem-erro {
            color: #c0392b;
            text-align: center;
            padding: 20px;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead {
                display: none;
            }

            tbody tr {
                margin-bottom: 15px;
                border: 1px solid var(--borda);
                border-radius: 8px;
                padding: 10px;
            }

            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 10px;
                border-bottom: 1px solid #f0f0f0;
            }

            td::before {
                content: attr(data-label);
                font-weight: 600;
                color: var(--roxo);
            }

            td:last-child {
                border-bottom: none;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Clientes</h1>
            <a href="novo-cliente.html" class="btn-novo">+ Novo Cliente</a>
        </header>

        <div class="filtro-container">
            <label for="busca">Buscar cliente</label>
            <input type="text" id="busca" placeholder="Digite o nome ou WhatsApp...">
        </div>

        <div class="tabela-container">
            <table id="tabela-clientes">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>WhatsApp</th>
                        <th>Email</th>
                        <th>Cidade/Estado</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="corpo-tabela">
                    <!-- Clientes serão carregados aqui -->
                </tbody>
            </table>
        </div>
    </div>

    <script>
        let clientesCache = [];

        async function carregarClientes() {
            try {
                const clientes = await buscarClientes();

                if (!Array.isArray(clientes)) {
                    console.error('O retorno de buscarClientes() não é um array:', clientes);
                    exibirMensagem('mensagem-erro', 'Não foi possível carregar a lista de clientes.');
                    return;
                }

                clientesCache = clientes;
                renderizarTabela(clientes);
            } catch (erro) {
                console.error('Erro ao carregar clientes:', erro);
                exibirMensagem('mensagem-erro', 'Erro ao carregar clientes. Tente novamente.');
            }
        }

        function renderizarTabela(clientes) {
            const corpoTabela = document.getElementById('corpo-tabela');
            corpoTabela.innerHTML = '';

            if (clientes.length === 0) {
                corpoTabela.innerHTML = `
                    <tr>
                        <td colspan="5" class="mensagem-vazia">
                            <p>Nenhum cliente encontrado.</p>
                        </td>
                    </tr>
                `;
                return;
            }

            clientes.forEach(cliente => {
                const cidade = cliente.cidade || '';
                const estado = cliente.estado || '';
                const cidadeEstado = formatarCidadeEstado(cidade, estado);

                const linha = document.createElement('tr');
                linha.innerHTML = `
                    <td data-label="Nome">${cliente.nome || '-'}</td>
                    <td data-label="WhatsApp">${cliente.whatsapp || '-'}</td>
                    <td data-label="Email">${cliente.email || '-'}</td>
                    <td data-label="Cidade/Estado">${cidadeEstado}</td>
                    <td data-label="Ações">
                        <a href="ficha-cliente.html?id=${cliente.id || ''}" class="btn-ficha">Ficha</a>
                    </td>
                `;
                corpoTabela.appendChild(linha);
            });
        }

        function formatarCidadeEstado(cidade, estado) {
            if (cidade && estado) {
                return `${cidade} / ${estado}`;
            }
            return cidade || estado || '-';
        }

        function exibirMensagem(classe, texto) {
            const corpoTabela = document.getElementById('corpo-tabela');
            corpoTabela.innerHTML = `
                <tr>
                    <td colspan="5" class="${classe}">
                        <p>${texto}</p>
                    </td>
                </tr>
            `;
        }

        function filtrarClientes() {
            const termo = document.getElementById('busca').value.toLowerCase().trim();
            const filtrados = clientesCache.filter(cliente => {
                const nome = (cliente.nome || '').toLowerCase();
                const whatsapp = (cliente.whatsapp || '').toLowerCase();
                return nome.includes(termo) || whatsapp.includes(termo);
            });
            renderizarTabela(filtrados);
        }

        document.addEventListener('DOMContentLoaded', () => {
            carregarClientes();
            document.getElementById('busca').addEventListener('input', filtrarClientes);
        });
    </script>
</body>
</html>

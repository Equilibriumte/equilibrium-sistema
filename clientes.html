<script>
    async function carregar() {
        const URL = 'https://script.google.com/macros/s/AKfycby6ijLv0hGmlY561Mn5_4R5XCRTbUsw7JMg5BiqFA3CdMLSfyheFkw2aO4rjHNvFxodAA/exec';
        try {
            // O segredo para evitar erro de conexão é o fetch simples
            const res = await fetch(URL);
            const dados = await res.json();
            
            const corpo = document.getElementById('corpo');
            document.getElementById('status').style.display = 'none';
            document.getElementById('tabela').style.display = 'table';
            corpo.innerHTML = ""; // Limpa a tabela antes de carregar

            dados.forEach(c => {
                corpo.innerHTML += `<tr>
                    <td style="font-family: monospace; color: #666;">${c.id || '-'}</td>
                    <td><strong>${c.nome || '-'}</strong></td>
                    <td>${c.whatsapp || '-'}</td>
                    <td>${c.cidade || '-'}</td>
                </tr>`;
            });
        } catch (e) {
            document.getElementById('status').innerHTML = 
                '<div style="color: red; padding: 20px;">❌ Erro ao carregar dados. Verifique se a Implantação do Google está como "Qualquer pessoa".</div>';
        }
    }
    window.onload = carregar;
</script>

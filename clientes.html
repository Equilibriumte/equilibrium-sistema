<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clientes - Equilibrium Radiestesia</title>
  <script src="js/database.js"></script>
  <style>
    :root {
      --roxo: #4B0082;
      --roxo-escuro: #2E0052;
      --dourado: #DAA520;
      --dourado-claro: #F0C869;
      --branco: #FFFFFF;
      --cinza: #F5F5F5;
      --cinza-escuro: #666666;
      --texto: #333333;
      --sombra: rgba(0, 0, 0, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--cinza);
      color: var(--texto);
      line-height: 1.5;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
      background: linear-gradient(135deg, var(--roxo), var(--roxo-escuro));
      padding: 24px 28px;
      border-radius: 10px;
      box-shadow: 0 4px 14px var(--sombra);
      margin-bottom: 24px;
    }

    .page-header h1 {
      font-size: 1.75rem;
      color: var(--dourado);
      font-weight: 600;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background-color: var(--dourado);
      color: var(--roxo-escuro);
      padding: 10px 18px;
      border: none;
      border-radius: 6px;
      font-weight: 700;
      text-decoration: none;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    .btn:hover {
      background-color: var(--dourado-claro);
      transform: translateY(-1px);
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }

    .search-box {
      width: 100%;
      max-width: 360px;
      padding: 10px 14px;
      border: 2px solid #E0E0E0;
      border-radius: 6px;
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box:focus {
      outline: none;
      border-color: var(--dourado);
      box-shadow: 0 0 0 3px rgba(218, 165, 32, 0.2);
    }

    .card {
      background-color: var(--branco);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 10px var(--sombra);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background-color: var(--roxo);
      color: var(--dourado);
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid #EEEEEE;
    }

    th {
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    tbody tr:hover {
      background-color: #FAFAFA;
    }

    .empty td {
      text-align: center;
      padding: 48px 20px;
      color: var(--cinza-escuro);
      font-style: italic;
    }

    .action-btn {
      background-color: transparent;
      color: var(--roxo);
      border: 1px solid var(--roxo);
      padding: 6px 12px;
      border-radius: 5px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
    }

    .action-btn:hover {
      background-color: var(--roxo);
      color: var(--dourado);
    }

    @media (max-width: 640px) {
      .page-header {
        flex-direction: column;
        align-items: flex-start;
      }
      .toolbar {
        justify-content: stretch;
      }
      .search-box {
        max-width: none;
      }
      th, td {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="page-header">
      <h1>Clientes</h1>
      <a href="novo-cliente.html" class="btn">+ Novo Cliente</a>
    </header>

    <div class="toolbar">
      <input type="text" id="busca" class="search-box" placeholder="Buscar por nome ou WhatsApp..." autocomplete="off">
    </div>

    <div class="card">
      <table id="tabela-clientes">
        <thead>
          <tr>
            <th>Nome</th>
            <th>WhatsApp</th>
            <th>Cidade/Estado</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody>
          <tr class="empty">
            <td colspan="4">Carregando clientes...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    let todosClientes = [];

    function obterValor(cliente, ...campos) {
      for (const campo of campos) {
        if (cliente[campo] !== undefined && cliente[campo] !== null && cliente[campo] !== '') {
          return cliente[campo];
        }
      }
      return '-';
    }

    function formatarCidadeEstado(cliente) {
      const cidade = cliente.cidade || cliente.city || '';
      const estado = cliente.estado || cliente.uf || cliente.state || '';

      if (cidade && estado) {
        return `${cidade} - ${estado}`;
      }

      if (cliente.endereco && typeof cliente.endereco === 'object') {
        const cid = cliente.endereco.cidade || cliente.endereco.city || '';
        const est = cliente.endereco.estado || cliente.endereco.uf || cliente.endereco.state || '';
        if (cid && est) return `${cid} - ${est}`;
        return cid || JSON.stringify(cliente.endereco);
      }

      if (cliente.endereco && typeof cliente.endereco === 'string') {
        const endereco = cliente.endereco;
        const match = endereco.match(/([^,]+)\s*-\s*([A-Za-z]{2})/);
        if (match) return `${match[1].trim()} - ${match[2].trim().toUpperCase()}`;

        const partes = endereco.split(',').map(p => p.trim()).filter(Boolean);
        if (partes.length >= 2) {
          const uf = partes[partes.length - 1].toUpperCase();
          const cidadeNome = partes[partes.length - 2];
          return `${cidadeNome} - ${uf}`;
        }
        return endereco;
      }

      return cidade || estado || '-';
    }

    function renderizarTabela(clientes) {
      const tbody = document.querySelector('#tabela-clientes tbody');
      tbody.innerHTML = '';

      if (!clientes || clientes.length === 0) {
        const linha = document.createElement('tr');
        linha.className = 'empty';
        const celula = document.createElement('td');
        celula.setAttribute('colspan', '4');
        celula.textContent = todosClientes.length === 0
          ? 'Nenhum cliente cadastrado. Clique em "+ Novo Cliente" para começar.'
          : 'Nenhum cliente encontrado para a busca.';
        linha.appendChild(celula);
        tbody.appendChild(linha);
        return;
      }

      clientes.forEach(cliente => {
        const linha = document.createElement('tr');

        const nome = obterValor(cliente, 'nome', 'name');
        const whatsapp = obterValor(cliente, 'whatsapp', 'telefone', 'phone');
        const cidadeEstado = formatarCidadeEstado(cliente);

        const celulaNome = document.createElement('td');
        celulaNome.textContent = nome;
        linha.appendChild(celulaNome);

        const celulaWhats = document.createElement('td');
        celulaWhats.textContent = whatsapp;
        linha.appendChild(celulaWhats);

        const celulaCidade = document.createElement('td');
        celulaCidade.textContent = cidadeEstado;
        linha.appendChild(celulaCidade);

        const celulaAcoes = document.createElement('td');
        const botao = document.createElement('button');
        botao.className = 'action-btn';
        botao.textContent = 'Ver Ficha';
        botao.addEventListener('click', () => verFicha(cliente.id));
        celulaAcoes.appendChild(botao);
        linha.appendChild(celulaAcoes);

        tbody.appendChild(linha);
      });
    }

    async function carregarClientes() {
      const tbody = document.querySelector('#tabela-clientes tbody');
      tbody.innerHTML = '<tr class="empty"><td colspan="4">Carregando clientes...</td></tr>';

      try {
        let clientes = [];
        if (window.Database && typeof Database.syncClientes === 'function') {
          const resultado = Database.syncClientes();
          clientes = resultado && typeof resultado.then === 'function' ? await resultado : resultado;
        }

        if (!Array.isArray(clientes)) {
          clientes = [];
        }

        todosClientes = clientes;
        renderizarTabela(todosClientes);
      } catch (erro) {
        console.error('Erro ao carregar clientes:', erro);
        tbody.innerHTML = '<tr class="empty"><td colspan="4">Erro ao carregar clientes. Tente novamente.</td></tr>';
      }
    }

    function filtrarClientes(termo) {
      const normalizado = termo.toLowerCase().trim();
      if (!normalizado) {
        renderizarTabela(todosClientes);
        return;
      }

      const filtrados = todosClientes.filter(cliente => {
        const nome = String(obterValor(cliente, 'nome', 'name')).toLowerCase();
        const whatsapp = String(obterValor(cliente, 'whatsapp', 'telefone', 'phone')).toLowerCase();
        return nome.includes(normalizado) || whatsapp.includes(normalizado);
      });

      renderizarTabela(filtrados);
    }

    function verFicha(id) {
      window.location.href = `ficha-cliente.html?id=${encodeURIComponent(id)}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
      carregarClientes();

      const campoBusca = document.getElementById('busca');
      if (campoBusca) {
        campoBusca.addEventListener('input', (evento) => filtrarClientes(evento.target.value));
      }
    });
  </script>
</body>
</html>
